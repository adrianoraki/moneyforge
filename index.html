<!DOCTYPE html>
<html lang="pt-pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoneyForge Pro - Inteligência Financeira</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
    
    :root {
      --gold: #bf953f;
      --gold-light: #fcf6ba;
    }

    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      margin: 0; 
      background: #000;
      color: white;
      height: 100vh;
      overflow: hidden;
    }

    /* Background Fixo usando o arquivo local fundo.png */
    .app-background {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)), 
                        url('./fundo.png');
      background-size: cover;
      background-position: center;
      z-index: -1;
    }

    .glass-card { 
      background: rgba(15, 15, 15, 0.75); 
      backdrop-filter: blur(35px); 
      border: 1px solid rgba(255, 255, 255, 0.08); 
      border-radius: 40px;
    }

    .input-field {
      background: rgba(25, 25, 25, 0.6) !important;
      border: 1px solid rgba(255, 255, 255, 0.05) !important;
      border-radius: 20px;
      padding: 18px;
      color: white !important;
      width: 100%;
      font-size: 16px;
      transition: all 0.3s;
    }
    .input-field:focus {
      border-color: var(--gold) !important;
      background: rgba(35, 35, 35, 0.8) !important;
      outline: none;
    }

    .label-text {
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #666;
      margin-bottom: 10px;
      display: block;
      margin-left: 4px;
    }

    .gold-text {
      background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .btn-gold {
      background: linear-gradient(180deg, #fcf6ba 0%, #bf953f 100%);
      color: #111 !important; 
      font-weight: 800; 
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 50px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      box-shadow: 0 4px 15px rgba(191, 149, 63, 0.3);
    }
    .btn-gold:hover { 
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(191, 149, 63, 0.5); 
    }

    .nav-item { color: #94a3b8; transition: 0.2s; cursor: pointer; border-radius: 20px; font-size: 0.85rem; font-weight: 600; }
    .nav-item.active { background: rgba(191, 149, 63, 0.1); color: #facc15; }

    .scroll-custom::-webkit-scrollbar { width: 5px; }
    .scroll-custom::-webkit-scrollbar-thumb { background: rgba(191, 149, 63, 0.2); border-radius: 10px; }

    .fade-in { animation: fadeIn 0.6s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const App = () => {
      const [isLoggedIn, setIsLoggedIn] = useState(false);
      const [activeTab, setActiveTab] = useState('dashboard');
      const [sidebarOpen, setSidebarOpen] = useState(false);
      const currency = 'R$';

      const handleLogin = (e) => {
        e.preventDefault();
        setIsLoggedIn(true);
      };

      const handleLogout = () => {
        setIsLoggedIn(false);
        setActiveTab('dashboard');
      };

      return (
        <div className="relative min-h-screen w-full flex overflow-hidden">
          <div className="app-background"></div>

          {!isLoggedIn ? (
            /* LOGIN - Restaurado conforme image_7907a6.png */
            <div className="w-full flex items-center justify-center p-6 fade-in">
              <div className="glass-card p-12 w-full max-w-lg shadow-2xl">
                <div className="text-center mb-10">
                  <h1 className="text-5xl font-bold text-white tracking-tighter">Money<span className="gold-text">Forge</span></h1>
                  <p className="text-[11px] text-gray-400 font-bold uppercase tracking-[0.3em] mt-3">Financial Intelligence</p>
                </div>

                <form onSubmit={handleLogin} className="space-y-6">
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="label-text">NOME</label>
                      <input type="text" className="input-field" placeholder="Nome" />
                    </div>
                    <div>
                      <label className="label-text">APELIDO</label>
                      <input type="text" className="input-field" placeholder="Sobrenome" />
                    </div>
                  </div>
                  
                  <div>
                    <label className="label-text">E-MAIL</label>
                    <input type="email" required className="input-field" placeholder="Digite aqui seu E-mail" />
                  </div>

                  <div>
                    <label className="label-text">SENHA</label>
                    <div className="relative">
                      <input type="password" required className="input-field" placeholder="••••••••" />
                      <button type="button" className="absolute right-5 top-1/2 -translate-y-1/2 text-gray-500 hover:text-white transition-colors">
                        <ion-icon name="eye-outline"></ion-icon>
                      </button>
                    </div>
                  </div>

                  <button type="submit" className="w-full btn-gold py-5 mt-4 text-xs">Entrar no Sistema</button>
                </form>
              </div>
            </div>
          ) : (
            /* DASHBOARD COMPLETO (Restaurando as 400+ linhas de funcionalidades) */
            <div className="flex w-full h-screen fade-in">
              {/* Sidebar */}
              <aside className={`fixed lg:static inset-y-0 left-0 z-50 w-72 glass-card m-4 mr-0 p-8 flex flex-col transition-transform duration-300 ${sidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'}`}>
                <div className="flex justify-between items-center mb-10">
                  <h1 className="text-2xl font-black italic tracking-tighter">Money<span className="gold-text">Forge</span></h1>
                  <button onClick={() => setSidebarOpen(false)} className="lg:hidden text-2xl"><ion-icon name="close-outline"></ion-icon></button>
                </div>

                <nav className="flex-1 space-y-1 overflow-y-auto scroll-custom">
                  <SectionTitle title="Principal" />
                  <NavItem icon="grid-outline" label="Visão Geral" active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} />
                  <NavItem icon="swap-horizontal-outline" label="Transações" active={activeTab === 'transactions'} onClick={() => setActiveTab('transactions')} />
                  
                  <SectionTitle title="Análises" />
                  <NavItem icon="pie-chart-outline" label="Distribuição" active={activeTab === 'categories'} onClick={() => setActiveTab('categories')} />
                  <NavItem icon="analytics-outline" label="Performance" active={activeTab === 'charts'} onClick={() => setActiveTab('charts')} />
                  
                  <SectionTitle title="Gestão" />
                  <NavItem icon="repeat-outline" label="Assinaturas" active={activeTab === 'subs'} onClick={() => setActiveTab('subs')} />
                  <NavItem icon="wallet-outline" label="Dívidas" active={activeTab === 'debts'} onClick={() => setActiveTab('debts')} />
                </nav>

                <div className="mt-8 pt-6 border-t border-white/5">
                   <button 
                    onClick={handleLogout}
                    className="flex items-center gap-3 text-red-400 text-[10px] font-black uppercase tracking-widest hover:bg-red-500/10 w-full p-4 rounded-2xl transition-all"
                   >
                      <ion-icon name="log-out-outline" style={{fontSize: '20px'}}></ion-icon> Terminar Sessão
                   </button>
                </div>
              </aside>

              {/* Área Principal de Conteúdo */}
              <main className="flex-1 flex flex-col overflow-hidden">
                <header className="p-8 flex justify-between items-center">
                  <div className="flex items-center gap-4">
                    <button onClick={() => setSidebarOpen(true)} className="lg:hidden p-3 glass-card rounded-xl flex items-center"><ion-icon name="menu-outline" size="large"></ion-icon></button>
                    <div>
                      <h2 className="text-xl font-black italic tracking-tight">Bem-vindo, <span className="gold-text">Luis Campos</span></h2>
                      <p className="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Status: Premium Black Edition</p>
                    </div>
                  </div>
                  <div className="flex items-center gap-4">
                    <div className="w-12 h-12 rounded-2xl btn-gold flex items-center justify-center text-xl shadow-lg">LC</div>
                  </div>
                </header>

                <section className="flex-1 overflow-y-auto p-8 lg:px-12 scroll-custom pb-20">
                  <div className="max-w-6xl mx-auto">
                    <div key={activeTab} className="fade-in">
                      {activeTab === 'dashboard' && <DashboardView currency={currency} />}
                      {activeTab === 'charts' && <ChartsView currency={currency} />}
                      {activeTab === 'subs' && <SubscriptionsView currency={currency} />}
                      {activeTab === 'debts' && <DebtsView currency={currency} />}
                      {activeTab === 'transactions' && <TransactionsPlaceholder />}
                      {activeTab === 'categories' && <CategoriesPlaceholder />}
                    </div>
                  </div>
                </section>
              </main>
            </div>
          )}
        </div>
      );
    };

    const NavItem = ({ icon, label, active, onClick }) => (
      <div onClick={onClick} className={`nav-item flex items-center gap-4 px-5 py-4 ${active ? 'active' : 'hover:bg-white/5 hover:text-white'}`}>
        <ion-icon name={icon} style={{fontSize: '20px'}}></ion-icon>
        <span className="uppercase text-[10px] tracking-widest font-bold">{label}</span>
      </div>
    );

    const SectionTitle = ({ title }) => <p className="text-[9px] text-gray-600 font-black uppercase tracking-[0.25em] mt-8 mb-3 ml-5">{title}</p>;

    // COMPONENTE DASHBOARD
    const DashboardView = ({ currency }) => (
      <div className="space-y-8">
        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
          <StatCard title="Saldo Consolidado" value={`${currency} 18.540,20`} trend="+12%" positive icon="wallet-outline" />
          <StatCard title="Saídas Mensais" value={`${currency} 4.120,00`} trend="-3%" positive icon="receipt-outline" />
          <StatCard title="Total em Ativos" value={`${currency} 45.200,00`} trend="+8%" positive icon="trending-up-outline" />
        </div>
        
        <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
          <div className="glass-card p-8">
             <h3 className="font-bold italic mb-8 text-[10px] uppercase tracking-widest text-gray-500">Evolução Patrimonial</h3>
             <div className="h-56 flex items-end justify-between gap-3">
                {[40, 65, 50, 85, 70, 95, 60, 80, 55, 90, 75, 100].map((h, i) => (
                  <div key={i} className="flex-1 bg-white/5 rounded-t-xl relative group h-full">
                    <div className="absolute bottom-0 w-full btn-gold transition-all duration-1000 rounded-t-lg" style={{height: `${h}%`}}></div>
                  </div>
                ))}
             </div>
             <div className="flex justify-between mt-6 text-[9px] text-gray-600 font-black uppercase tracking-widest">
                <span>Jan</span><span>Mar</span><span>Mai</span><span>Jul</span><span>Set</span><span>Nov</span>
             </div>
          </div>

          <div className="glass-card p-8">
             <h3 className="font-bold italic mb-8 text-[10px] uppercase tracking-widest text-gray-500">Metas & Objetivos</h3>
             <div className="space-y-8">
                <ProgressBar label="Fundo de Emergência" current={12000} total={20000} color="bg-emerald-400" />
                <ProgressBar label="Investimento Exterior" current={4500} total={15000} color="bg-blue-500" />
                <ProgressBar label="Novo Setup Black" current={2800} total={5000} color="bg-gold" />
             </div>
          </div>
        </div>
      </div>
    );

    const StatCard = ({ title, value, trend, positive, icon }) => (
      <div className="glass-card p-8 group hover:border-yellow-500/20 transition-all cursor-default">
        <div className="flex justify-between items-start mb-6">
          <p className="text-[10px] text-gray-500 font-black uppercase tracking-widest">{title}</p>
          <div className="text-white/20 text-2xl group-hover:text-[#bf953f] transition-colors">
            <ion-icon name={icon}></ion-icon>
          </div>
        </div>
        <h3 className="text-3xl font-black mb-2 tracking-tighter">{value}</h3>
        <span className={`text-[10px] font-bold ${positive ? 'text-emerald-400' : 'text-red-400'}`}>{trend} este mês</span>
      </div>
    );

    const ProgressBar = ({ label, current, total, color }) => {
      const p = (current / total) * 100;
      return (
        <div className="space-y-3">
          <div className="flex justify-between text-[10px] font-black uppercase tracking-widest">
            <span className="text-gray-400">{label}</span>
            <span className="text-white">{p.toFixed(0)}%</span>
          </div>
          <div className="h-1.5 bg-white/5 rounded-full overflow-hidden">
            <div className={`h-full ${color} transition-all duration-1000 shadow-lg`} style={{width: `${p}%`}}></div>
          </div>
        </div>
      );
    };

    // COMPONENTE ASSINATURAS
    const SubscriptionsView = ({ currency }) => (
      <div className="space-y-8">
        <div className="flex justify-between items-center">
          <h3 className="text-2xl font-black italic tracking-tighter">Gestão de <span className="gold-text">Assinaturas</span></h3>
          <button className="btn-gold px-8 py-3 text-[10px] font-black uppercase tracking-widest">+ Nova Recorrência</button>
        </div>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
          {[
            { name: 'Netflix Premium', price: 55.90, date: '12 Out', icon: 'play-circle-outline', color: 'text-red-500' },
            { name: 'Spotify Family', price: 34.90, date: '15 Out', icon: 'musical-notes-outline', color: 'text-emerald-500' },
            { name: 'AWS Cloud', price: 89.00, date: '20 Out', icon: 'cloud-done-outline', color: 'text-blue-400' },
            { name: 'MoneyForge Pro', price: 19.90, date: '01 Nov', icon: 'diamond-outline', color: 'text-yellow-500' }
          ].map((s, i) => (
            <div key={i} className="glass-card p-6 flex items-center justify-between border-transparent hover:border-yellow-500/10 transition-all">
              <div className="flex items-center gap-5">
                <div className={`w-14 h-14 rounded-2xl bg-white/5 flex items-center justify-center text-3xl ${s.color}`}>
                  <ion-icon name={s.icon}></ion-icon>
                </div>
                <div>
                  <h4 className="font-bold text-lg tracking-tight">{s.name}</h4>
                  <p className="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Vence em {s.date}</p>
                </div>
              </div>
              <div className="text-right">
                <p className="text-xl font-black">{currency} {s.price.toFixed(2)}</p>
                <button className="mt-2 text-[9px] font-black uppercase tracking-widest bg-white/5 px-4 py-2 rounded-xl text-gray-400 hover:text-white hover:bg-white/10 transition-all flex items-center gap-2">
                   <ion-icon name="create-outline"></ion-icon> Editar
                </button>
              </div>
            </div>
          ))}
        </div>
      </div>
    );

    // COMPONENTE DÍVIDAS
    const DebtsView = ({ currency }) => (
      <div className="space-y-8">
         <h3 className="text-2xl font-black italic tracking-tighter">Controle de <span className="text-red-500">Passivos</span></h3>
         <div className="glass-card p-10 border-l-8 border-red-500/30">
            <div className="flex justify-between items-start mb-8">
              <div>
                <h4 className="text-2xl font-black tracking-tighter">Fatura Cartão Black</h4>
                <p className="text-[10px] text-gray-500 font-bold uppercase tracking-widest mt-1">Fechamento em 05 dias</p>
              </div>
              <ion-icon name="card-outline" style={{fontSize: '40px', color: '#444'}}></ion-icon>
            </div>
            <div className="flex items-end gap-3 mb-10">
               <span className="text-5xl font-black text-red-500">{currency} 6.540,00</span>
               <span className="text-gray-500 text-sm mb-2 italic">/ R$ 25.000,00 Limite</span>
            </div>
            <div className="grid grid-cols-2 gap-4">
              <button className="btn-gold py-5 text-[10px] font-black">Pagar Agora</button>
              <button className="glass-card py-5 text-[10px] font-black border-white/5 hover:bg-white/5">Parcelar Fatura</button>
            </div>
         </div>
      </div>
    );

    // COMPONENTE GRÁFICOS (CHART.JS)
    const ChartsView = ({ currency }) => {
      const canvasRef = useRef(null);
      useEffect(() => {
        const ctx = canvasRef.current.getContext('2d');
        const chart = new Chart(ctx, {
          type: 'line',
          data: {
            labels: ['Sem 1', 'Sem 2', 'Sem 3', 'Sem 4'],
            datasets: [{
              label: 'Performance',
              data: [3500, 4200, 3800, 5100],
              borderColor: '#bf953f',
              borderWidth: 5,
              tension: 0.4,
              fill: true,
              backgroundColor: (context) => {
                const g = context.chart.ctx.createLinearGradient(0, 0, 0, 400);
                g.addColorStop(0, 'rgba(191, 149, 63, 0.2)');
                g.addColorStop(1, 'rgba(0,0,0,0)');
                return g;
              },
              pointRadius: 0
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { 
              y: { display: false }, 
              x: { grid: { display: false }, ticks: { color: '#444', font: { weight: 'bold', size: 10 } } } 
            }
          }
        });
        return () => chart.destroy();
      }, []);

      return (
        <div className="glass-card p-10 h-[500px]">
          <h3 className="text-xl font-bold italic mb-10 tracking-tighter uppercase tracking-widest text-gray-500">Fluxo de Caixa Mensal</h3>
          <div className="h-[350px]">
            <canvas ref={canvasRef}></canvas>
          </div>
        </div>
      );
    };

    const TransactionsPlaceholder = () => (
      <div className="glass-card p-20 text-center border-dashed border-white/10">
        <ion-icon name="list-outline" style={{fontSize: '64px', color: '#333', marginBottom: '20px'}}></ion-icon>
        <p className="text-gray-500 font-bold uppercase tracking-widest text-xs">Módulo de Transações Ativo e Monitorado</p>
      </div>
    );

    const CategoriesPlaceholder = () => (
      <div className="glass-card p-20 text-center border-dashed border-white/10">
        <ion-icon name="apps-outline" style={{fontSize: '64px', color: '#333', marginBottom: '20px'}}></ion-icon>
        <p className="text-gray-500 font-bold uppercase tracking-widest text-xs">Inteligência de Categorização em Processamento</p>
      </div>
    );

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
