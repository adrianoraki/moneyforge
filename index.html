<!DOCTYPE html>
<html lang="pt-pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoneyForge Pro | Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Script do Supabase corrigido -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;700;800&display=swap');
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0a0a0a; color: #fff; margin: 0; height: 100vh; overflow: hidden; }
    .glass { background: rgba(15, 15, 15, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
    .gold-text { color: #bf953f; }
    .nav-active { background: rgba(191, 149, 63, 0.1); border: 1px solid rgba(191, 149, 63, 0.2); color: #bf953f; }
    .loader { border: 2px solid rgba(191,149,63,0.1); border-top: 2px solid #bf953f; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    
    #no-render-notice {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 9999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>
<body>
  <div id="no-render-notice">
    <h1 style="color: #bf953f; font-weight: 800; font-size: 24px;">MONEYFORGE PRO</h1>
    <p style="color: #666; margin: 15px 0;">O motor de renderização demorou demasiado tempo a responder.</p>
    <a href="login.html" style="background: #bf953f; color: #000; padding: 12px 24px; border-radius: 12px; font-weight: bold; text-decoration: none;">Ir para o Login</a>
  </div>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    
    // Configuração Supabase (Substituir se necessário)
    const SUPABASE_URL = 'https://onpdxpobidntgofqshlk.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9ucGR4cG9iaWRudGdvZnFzaGxrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDEyMzYyMjAsImV4cCI6MjA1NjgxMjIyMH0.fK0A9-Y-vN4o7Jp3D0H6m0Qo9H_6O_oH_oH_oH_oH_o';
    
    // Inicialização segura do cliente
    let supabaseClient;
    try {
        supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    } catch (e) {
        console.error("Erro ao inicializar Supabase:", e);
    }

    function App() {
      const [session, setSession] = useState(null);
      const [loading, setLoading] = useState(true);
      const [activeTab, setActiveTab] = useState('home');
      const [data, setData] = useState([]);
      const [error, setError] = useState(null);

      useEffect(() => {
        const checkSession = async () => {
          try {
            if (!supabaseClient) throw new Error("Cliente Supabase não disponível.");

            const { data: { session: current }, error: sessionError } = await supabaseClient.auth.getSession();
            
            if (sessionError) throw sessionError;

            if (!current) {
              console.warn("Sem sessão detectada.");
              // Em ambiente de preview, o redirecionamento pode falhar, então mostramos uma mensagem amigável
              setError("Sessão não encontrada. Por favor, realize o login primeiro.");
            } else {
              setSession(current);
              await loadData();
            }
          } catch (err) {
            console.error("Erro na App:", err);
            setError(err.message);
          } finally {
            setLoading(false);
          }
        };

        checkSession();
      }, []);

      async function loadData() {
        try {
          const { data: list, error: fetchError } = await supabaseClient
            .from('transactions')
            .select('*')
            .order('date', { ascending: false });
          
          if (fetchError) throw fetchError;
          setData(list || []);
        } catch (err) {
          console.error("Erro ao carregar dados:", err);
        }
      }

      async function logout() {
        await supabaseClient.auth.signOut();
        window.location.reload(); // Recarregar para disparar a verificação de sessão
      }

      if (loading) {
        return (
          <div className="h-screen flex flex-col items-center justify-center bg-black">
            <div className="loader mb-4"></div>
            <p className="text-[10px] font-bold gold-text tracking-[0.3em] uppercase">A carregar MoneyForge...</p>
          </div>
        );
      }

      if (error) {
        return (
          <div className="h-screen flex flex-col items-center justify-center bg-black p-8 text-center">
            <div className="mb-6 text-yellow-600 text-5xl">
                <ion-icon name="lock-closed-outline"></ion-icon>
            </div>
            <h1 className="text-2xl font-black gold-text mb-4 uppercase tracking-tighter">Acesso Restrito</h1>
            <p className="text-white/40 mb-8 max-w-sm text-sm">{error}</p>
            <button 
                onClick={() => window.location.reload()}
                className="bg-[#bf953f] text-black px-8 py-3 rounded-xl uppercase text-[10px] font-black tracking-widest hover:brightness-110 transition-all"
            >
              Tentar Novamente
            </button>
          </div>
        );
      }

      return (
        <div className="flex h-screen p-4 gap-4 animate-in fade-in duration-500">
          {/* Sidebar */}
          <aside className="w-64 glass rounded-[24px] p-6 flex flex-col shrink-0">
            <h1 className="text-xl font-black italic mb-10">Money<span className="gold-text">Forge</span></h1>
            <nav className="flex-1 space-y-2">
              <div onClick={() => setActiveTab('home')} className={`p-4 rounded-xl flex items-center gap-3 cursor-pointer transition-all ${activeTab === 'home' ? 'nav-active' : 'text-white/20 hover:text-white'}`}>
                <ion-icon name="grid-outline"></ion-icon> <span className="text-[10px] font-bold uppercase tracking-widest">Dashboard</span>
              </div>
              <div onClick={() => setActiveTab('list')} className={`p-4 rounded-xl flex items-center gap-3 cursor-pointer transition-all ${activeTab === 'list' ? 'nav-active' : 'text-white/20 hover:text-white'}`}>
                <ion-icon name="list-outline"></ion-icon> <span className="text-[10px] font-bold uppercase tracking-widest">Extrato</span>
              </div>
            </nav>
            <div className="pt-4 border-t border-white/5">
              <p className="text-[9px] text-white/30 truncate mb-4">{session?.user?.email}</p>
              <button onClick={logout} className="text-red-500/50 hover:text-red-500 text-[10px] font-bold uppercase flex items-center gap-2 transition-colors">
                <ion-icon name="log-out-outline"></ion-icon> Encerrar Sessão
              </button>
            </div>
          </aside>

          {/* Main Area */}
          <main className="flex-1 flex flex-col gap-4 overflow-hidden">
            <header className="h-20 glass rounded-[24px] flex items-center justify-between px-8 shrink-0">
              <h2 className="text-sm font-black uppercase tracking-widest italic">{activeTab === 'home' ? 'Visão Geral' : 'Histórico Global'}</h2>
              <div className="flex items-center gap-4">
                 <button className="bg-white/5 hover:bg-white/10 p-3 rounded-full text-lg flex items-center text-yellow-500/50"><ion-icon name="notifications-outline"></ion-icon></button>
              </div>
            </header>

            <section className="flex-1 glass rounded-[24px] p-8 overflow-y-auto">
              {data.length === 0 ? (
                <div className="h-full flex flex-col items-center justify-center opacity-20 italic">
                  <ion-icon name="cube-outline" style={{fontSize: '40px'}}></ion-icon>
                  <p className="mt-2 text-sm uppercase font-bold tracking-widest">Sem registos encontrados.</p>
                </div>
              ) : (
                <div className="grid gap-4">
                  {data.map(t => (
                    <div key={t.id} className="p-4 bg-white/5 rounded-xl flex justify-between items-center border border-white/5 hover:border-yellow-500/20 transition-all">
                      <div className="flex items-center gap-4">
                         <div className={`w-10 h-10 rounded-lg flex items-center justify-center ${t.type === 'income' ? 'bg-emerald-500/10 text-emerald-500' : 'bg-white/5 text-white/40'}`}>
                            <ion-icon name={t.type === 'income' ? 'arrow-up-outline' : 'arrow-down-outline'}></ion-icon>
                         </div>
                         <div>
                            <p className="font-bold text-sm italic">{t.description}</p>
                            <p className="text-[10px] text-white/20 uppercase font-bold tracking-tighter">{t.category} • {new Date(t.date).toLocaleDateString('pt-PT')}</p>
                         </div>
                      </div>
                      <div className={`font-black italic text-sm ${t.type === 'income' ? 'text-emerald-500' : 'text-white'}`}>
                        {t.type === 'income' ? '+' : '-'} {Number(t.value).toLocaleString('pt-PT', { style: 'currency', currency: 'EUR' })}
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </section>
          </main>
        </div>
      );
    }

    // Renderização inicial
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
