<!DOCTYPE html>
<html lang="pt-pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoneyForge - Gestão Financeira</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@17/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
    
    body, html { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background-color: #050505;
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    .login-container {
      background-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.1), rgba(0, 0, 0, 0.4)), 
                        url('./fundo.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      min-height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: fixed;
      top: 0; left: 0;
    }

    .glass-card {
      background: rgba(0, 0, 0, 0.25); 
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
      max-height: 90vh;
      overflow-y: auto;
    }

    .glass-card::-webkit-scrollbar { display: none; }

    .input-field {
      background: rgba(255, 255, 255, 0.03); 
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: white;
      transition: all 0.3s ease;
    }

    .input-field:focus {
      border-color: rgba(191, 149, 63, 0.5); 
      background: rgba(255, 255, 255, 0.06);
      outline: none;
    }

    .gold-button {
      background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
      color: #000;
      font-weight: 800;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .gold-button:hover {
      transform: translateY(-2px);
      filter: brightness(1.1);
      box-shadow: 0 15px 30px -5px rgba(184, 134, 11, 0.4);
    }

    .fade-in {
      animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .eye-icon {
      color: rgba(255, 255, 255, 0.4);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const SUPABASE_URL = "https://bicljinwvfmmjllnshcd.supabase.co"; 
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJpY2xqaW53dmZtbWpsbG5zaGNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4Mzc3MDcsImV4cCI6MjA4OTQxMzcwN30.4YbAXUNq79BueSwct3RYKRI0eNJ0pWxMzM_VGTlhz6Q";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const App = () => {
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(false);
      const [showPassword, setShowPassword] = useState(false);
      const [isLogin, setIsLogin] = useState(true);
      const [formData, setFormData] = useState({ 
        email: '', 
        password: '',
        firstName: '',
        lastName: ''
      });

      useEffect(() => {
        supabaseClient.auth.getSession().then(({ data: { session } }) => {
          setUser(session?.user ?? null);
        });
        const { data: { subscription } } = supabaseClient.auth.onAuthStateChange((_event, session) => {
          setUser(session?.user ?? null);
        });
        return () => subscription.unsubscribe();
      }, []);

      const handleAuth = async (e) => {
        e.preventDefault();
        setLoading(true);
        
        let result;
        if (isLogin) {
          result = await supabaseClient.auth.signInWithPassword({
            email: formData.email,
            password: formData.password
          });
        } else {
          result = await supabaseClient.auth.signUp({
            email: formData.email,
            password: formData.password,
            options: {
              data: {
                first_name: formData.firstName,
                last_name: formData.lastName
              }
            }
          });
        }
        
        const { error, data } = result;
        
        if (error) {
          alert(error.message);
        } else if (!isLogin && data?.user && !data?.session) {
          alert("Conta criada! Verifique o seu e-mail para ativar.");
        }
        setLoading(false);
      };

      if (!user) {
        return (
          <div className="login-container px-6">
            <div className="w-full max-w-sm glass-card p-8 rounded-[2.5rem] fade-in flex flex-col items-center">
              
              <div className="text-center mb-6">
                <h1 className="text-4xl font-black text-white tracking-tighter">
                  Money<span className="text-yellow-500">Forge</span>
                </h1>
                <p className="text-[10px] text-gray-400 tracking-[0.4em] font-black uppercase mt-2 opacity-60">
                  Financial Intelligence
                </p>
              </div>

              <form className="w-full space-y-3" onSubmit={handleAuth}>
                
                {!isLogin && (
                  <div className="grid grid-cols-2 gap-3 fade-in">
                    <div className="space-y-1">
                      <label className="text-[9px] uppercase font-bold text-gray-500 ml-2 tracking-widest">Nome</label>
                      <input 
                        type="text" 
                        placeholder="Nome" 
                        className="input-field w-full p-3 rounded-xl text-sm outline-none"
                        onChange={e => setFormData({...formData, firstName: e.target.value})}
                        required
                      />
                    </div>
                    <div className="space-y-1">
                      <label className="text-[9px] uppercase font-bold text-gray-500 ml-2 tracking-widest">Sobrenome</label>
                      <input 
                        type="text" 
                        placeholder="Sobrenome" 
                        className="input-field w-full p-3 rounded-xl text-sm outline-none"
                        onChange={e => setFormData({...formData, lastName: e.target.value})}
                        required
                      />
                    </div>
                  </div>
                )}

                <div className="space-y-1">
                  <label className="text-[9px] uppercase font-bold text-gray-500 ml-2 tracking-widest">E-mail</label>
                  <input 
                    type="email" 
                    placeholder="Digite aqui seu E-mail" 
                    className="input-field w-full p-3 rounded-xl text-sm outline-none"
                    onChange={e => setFormData({...formData, email: e.target.value})}
                    required
                  />
                </div>

                <div className="space-y-1 relative">
                  <label className="text-[9px] uppercase font-bold text-gray-500 ml-2 tracking-widest">Senha</label>
                  <div className="relative">
                    <input 
                      type={showPassword ? "text" : "password"} 
                      placeholder="••••••••" 
                      className="input-field w-full p-3 rounded-xl text-sm pr-12 outline-none"
                      onChange={e => setFormData({...formData, password: e.target.value})}
                      required
                    />
                    <button 
                      type="button"
                      onClick={() => setShowPassword(!showPassword)}
                      className="absolute right-4 top-1/2 -translate-y-1/2 text-xl flex items-center eye-icon"
                    >
                      <ion-icon name={showPassword ? "eye-off-outline" : "eye-outline"}></ion-icon>
                    </button>
                  </div>
                </div>

                <button 
                  disabled={loading}
                  className="gold-button w-full py-4 rounded-xl text-sm font-bold mt-4 shadow-xl active:scale-95 transition-all disabled:opacity-50"
                >
                  {loading ? 'A processar...' : (isLogin ? 'Entrar' : 'Registar')}
                </button>

                <div className="text-center pt-2">
                  <button 
                    type="button"
                    onClick={() => setIsLogin(!isLogin)}
                    className="text-[9px] text-gray-400 font-bold uppercase tracking-[0.15em] hover:text-white transition-all underline underline-offset-4 decoration-yellow-600/30"
                  >
                    {isLogin ? 'Criar nova conta' : 'Já tenho conta'}
                  </button>
                </div>
              </form>
            </div>
          </div>
        );
      }

      const displayName = user.user_metadata?.first_name || user.email;

      return (
        <div className="h-screen flex flex-col items-center justify-center bg-black text-white px-6">
          <div className="text-center fade-in max-w-md w-full">
            <div className="mb-8">
               <ion-icon name="person-circle-outline" style={{fontSize: '64px', color: '#facc15'}}></ion-icon>
            </div>
            <h2 className="text-4xl font-black mb-2 uppercase tracking-tighter">
              Seja Bem-vindo,
            </h2>
            <p className="text-2xl font-light text-yellow-500 mb-8 italic">
              {displayName} {user.user_metadata?.last_name || ''}
            </p>
            
            <div className="bg-white/5 border border-white/10 p-6 rounded-3xl mb-8">
                <p className="text-sm text-gray-400 leading-relaxed">
                  O seu painel de inteligência financeira está a ser preparado. 
                  Estamos prontos para forjar o seu futuro.
                </p>
            </div>

            <button 
              onClick={() => supabaseClient.auth.signOut()}
              className="gold-button px-12 py-4 rounded-full text-xs font-black shadow-2xl"
            >
              Terminar Sessão
            </button>
          </div>
        </div>
      );
    };

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
