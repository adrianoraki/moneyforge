<!DOCTYPE html>
<html lang="pt-pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoneyForge Pro - Inteligência Financeira</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
    
    :root {
      --gold: #bf953f;
      --gold-light: #fcf6ba;
    }

    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      margin: 0; 
      overflow: hidden;
      background: #050505;
      color: white;
    }

    /* Background Fixo e Unificado */
    .app-bg-container {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 20% 30%, #111 0%, #050505 100%);
      z-index: -1;
    }

    .bg-glow {
      position: absolute;
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(191, 149, 63, 0.08) 0%, rgba(0,0,0,0) 70%);
      border-radius: 50%;
      filter: blur(80px);
      animation: float 25s infinite alternate ease-in-out;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(50px, 30px) scale(1.1); }
      100% { transform: translate(-30px, 60px) scale(1); }
    }

    .glass { 
      background: rgba(255, 255, 255, 0.03); 
      backdrop-filter: blur(30px); 
      border: 1px solid rgba(255, 255, 255, 0.08); 
    }
    
    .gold-text {
      background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .btn-gold {
      background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728);
      color: #000 !important; font-weight: 800; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(191, 149, 63, 0.3); }

    .nav-item { color: #94a3b8; transition: 0.2s; cursor: pointer; border-radius: 16px; font-size: 0.8rem; font-weight: 600; }
    .nav-item.active { background: rgba(191, 149, 63, 0.1); color: #facc15; border-left: 3px solid #bf953f; }

    .scroll-hide::-webkit-scrollbar { width: 4px; }
    .scroll-hide::-webkit-scrollbar-thumb { background: rgba(191, 149, 63, 0.2); border-radius: 10px; }

    .fade-in { animation: fadeIn 0.5s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

    input { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const App = () => {
      const [isLoggedIn, setIsLoggedIn] = useState(false);
      const [activeTab, setActiveTab] = useState('dashboard');
      const [sidebar, setSidebar] = useState(false);
      const [theme, setTheme] = useState('Deep Black');
      const currency = 'R$';

      const handleLogin = (e) => {
        e.preventDefault();
        setIsLoggedIn(true);
      };

      const handleLogout = () => {
        setIsLoggedIn(false);
        setActiveTab('dashboard');
        setSidebar(false);
      };

      return (
        <div className={`relative min-h-screen w-full transition-colors duration-500 ${theme === 'Modern Light' ? 'bg-gray-100 text-black' : 'text-white'}`}>
          {/* Background Persistente para toda a aplicação */}
          <div className="app-bg-container">
            <div className="bg-glow" style={{top: '10%', left: '5%'}}></div>
            <div className="bg-glow" style={{bottom: '10%', right: '5%', animationDelay: '-7s'}}></div>
          </div>

          {!isLoggedIn ? (
            /* Tela de Login */
            <div className="h-screen flex items-center justify-center p-6 fade-in">
              <div className="glass p-10 rounded-[3.5rem] w-full max-w-md relative z-10 shadow-2xl">
                <div className="text-center mb-10">
                  <h1 className="text-4xl font-black gold-text italic mb-2 tracking-tighter">MoneyForge</h1>
                  <p className="text-gray-500 text-[10px] font-bold uppercase tracking-[0.3em]">Exclusividade & Inteligência</p>
                </div>

                <form onSubmit={handleLogin} className="space-y-6">
                  <div>
                    <label className="text-[10px] font-black uppercase tracking-widest text-gray-500 ml-1">Credencial</label>
                    <input type="email" required className="w-full p-4 rounded-2xl mt-1 focus:outline-none focus:border-yellow-500/50 transition-all text-sm" placeholder="seu@email.com" />
                  </div>
                  <div>
                    <label className="text-[10px] font-black uppercase tracking-widest text-gray-500 ml-1">Código Seguro</label>
                    <input type="password" required className="w-full p-4 rounded-2xl mt-1 focus:outline-none focus:border-yellow-500/50 transition-all text-sm" placeholder="••••••••" />
                  </div>
                  <button type="submit" className="w-full btn-gold py-5 rounded-2xl mt-4 text-[11px] uppercase tracking-[0.2em] shadow-xl shadow-gold/10">Aceder ao Cofre</button>
                </form>

                <div className="mt-8 text-center">
                  <p className="text-[10px] text-gray-600 font-bold uppercase tracking-widest">Acesso restrito a convidados</p>
                </div>
              </div>
            </div>
          ) : (
            /* Layout Principal Logado */
            <div className="flex h-screen w-full">
              {/* Sidebar */}
              <aside className={`fixed lg:static inset-y-0 left-0 z-50 w-72 glass p-8 transition-transform duration-300 ${sidebar ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'}`}>
                <div className="flex items-center justify-between mb-12">
                  <h1 className="text-2xl font-black italic tracking-tighter">Money<span className="gold-text">Forge</span></h1>
                  <button onClick={() => setSidebar(false)} className="lg:hidden text-2xl text-gray-500"><ion-icon name="close-outline"></ion-icon></button>
                </div>

                <nav className="space-y-1 overflow-y-auto scroll-hide h-[calc(100vh-250px)]">
                  <SectionTitle title="Essencial" />
                  <NavItem icon="grid-outline" label="Dashboard" active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} />
                  <NavItem icon="swap-horizontal-outline" label="Transações" active={activeTab === 'transactions'} onClick={() => setActiveTab('transactions')} />
                  <NavItem icon="pie-chart-outline" label="Categorias" active={activeTab === 'categories'} onClick={() => setActiveTab('categories')} />
                  
                  <SectionTitle title="Gestão Inteligente" />
                  <NavItem icon="analytics-outline" label="Tendências" active={activeTab === 'charts'} onClick={() => setActiveTab('charts')} />
                  <NavItem icon="repeat-outline" label="Assinaturas" active={activeTab === 'subs'} onClick={() => setActiveTab('subs')} />
                  <NavItem icon="wallet-outline" label="Dívidas" active={activeTab === 'debts'} onClick={() => setActiveTab('debts')} />
                  
                  <SectionTitle title="Sistema" />
                  <NavItem icon="settings-outline" label="Definições" active={activeTab === 'settings'} onClick={() => setActiveTab('settings')} />
                </nav>

                <div className="mt-auto pt-6 border-t border-white/5">
                   <button 
                    onClick={handleLogout}
                    className="flex items-center gap-3 text-red-400 text-[11px] font-black uppercase tracking-widest hover:text-red-300 transition-colors w-full p-3 glass rounded-xl"
                   >
                      <ion-icon name="log-out-outline" style={{fontSize: '20px'}}></ion-icon> Encerrar Sessão
                   </button>
                </div>
              </aside>

              {/* Área Principal */}
              <main className="flex-1 flex flex-col overflow-hidden relative">
                <header className="p-8 flex justify-between items-center z-10">
                  <button onClick={() => setSidebar(true)} className="lg:hidden p-2 glass rounded-xl flex items-center"><ion-icon name="menu-outline" size="large"></ion-icon></button>
                  <h2 className="text-xl font-bold italic hidden sm:block uppercase tracking-tighter">
                    {activeTab === 'dashboard' && "Visão Geral"}
                    {activeTab === 'transactions' && "Histórico"}
                    {activeTab === 'categories' && "Distribuição"}
                    {activeTab === 'charts' && "Análise Pro"}
                    {activeTab === 'subs' && "Recorrências"}
                    {activeTab === 'debts' && "Passivos"}
                    {activeTab === 'settings' && "Configurações"}
                  </h2>
                  <div className="flex items-center gap-4">
                    <div className="text-right">
                      <p className="text-[10px] text-gray-500 font-black uppercase tracking-widest">Premium Black</p>
                      <p className="text-[10px] font-bold text-emerald-400 uppercase tracking-widest">Sessão Ativa</p>
                    </div>
                    <div className="w-10 h-10 rounded-2xl btn-gold flex items-center justify-center text-sm shadow-lg shadow-gold/20">JS</div>
                  </div>
                </header>

                <section className="flex-1 overflow-y-auto p-8 lg:px-16 scroll-hide pb-20">
                  <div className="max-w-5xl mx-auto">
                    <div key={activeTab} className="fade-in">
                      {activeTab === 'dashboard' && <Dashboard currency={currency} />}
                      {activeTab === 'transactions' && <div className="glass p-10 rounded-[3rem] text-center"><p className="text-gray-500 font-bold uppercase text-xs">A carregar transações...</p></div>}
                      {activeTab === 'categories' && <div className="glass p-10 rounded-[3rem] text-center"><p className="text-gray-500 font-bold uppercase text-xs">Módulo de Categorias</p></div>}
                      {activeTab === 'charts' && <ChartsView currency={currency} />}
                      {activeTab === 'subs' && <SubscriptionsView currency={currency} />}
                      {activeTab === 'debts' && <DebtsView currency={currency} />}
                      {activeTab === 'settings' && <SettingsView currency={currency} theme={theme} setTheme={setTheme} />}
                    </div>
                  </div>
                </section>
              </main>
            </div>
          )}
        </div>
      );
    };

    const NavItem = ({ icon, label, active, onClick }) => (
      <div onClick={onClick} className={`nav-item flex items-center gap-4 px-5 py-4 ${active ? 'active' : 'hover:bg-white/5'}`}>
        <ion-icon name={icon} style={{fontSize: '20px'}}></ion-icon>
        <span className="tracking-tight">{label}</span>
      </div>
    );

    const SectionTitle = ({ title }) => <p className="text-[9px] text-gray-600 font-black uppercase tracking-[0.25em] mt-8 mb-3 ml-5">{title}</p>;

    // Componentes de Visão
    const Dashboard = ({ currency }) => (
      <div className="space-y-8">
        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
          <StatCard title="Saldo Consolidado" value={`${currency} 15.420,00`} trend="+12.5%" positive icon="wallet-outline" />
          <StatCard title="Despesas Mensais" value={`${currency} 3.200,00`} trend="Dentro da meta" icon="receipt-outline" />
          <StatCard title="Ativos em Carteira" value={`${currency} 25.150,00`} trend="+5.2%" positive icon="trending-up-outline" />
        </div>
        
        <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
          <div className="glass p-8 rounded-[2.5rem]">
             <h3 className="font-bold italic mb-6 text-xs uppercase tracking-widest text-gray-500">Movimentação Semanal</h3>
             <div className="h-48 flex items-end justify-between gap-3">
                {[45, 80, 55, 95, 75, 90, 60].map((h, i) => (
                  <div key={i} className="flex-1 bg-white/5 rounded-t-xl relative group h-full">
                    <div className="absolute bottom-0 w-full btn-gold transition-all duration-700 rounded-t-lg shadow-lg" style={{height: `${h}%`}}></div>
                  </div>
                ))}
             </div>
             <div className="flex justify-between mt-4 text-[9px] text-gray-500 font-black uppercase tracking-widest">
                <span>Seg</span><span>Ter</span><span>Qua</span><span>Qui</span><span>Sex</span><span>Sáb</span><span>Dom</span>
             </div>
          </div>
          <div className="glass p-8 rounded-[2.5rem]">
             <h3 className="font-bold italic mb-6 text-xs uppercase tracking-widest text-gray-500">Metas Ativas</h3>
             <div className="space-y-6">
                <LimitBar label="Fundo de Reserva" current={8500} total={10000} color="bg-emerald-400" />
                <LimitBar label="Investimentos Diversos" current={3200} total={15000} color="bg-blue-400" />
                <LimitBar label="Equipamentos Tech" current={1500} total={2500} color="bg-purple-500" />
             </div>
          </div>
        </div>
      </div>
    );

    const StatCard = ({ title, value, trend, positive, icon }) => (
      <div className="glass p-8 rounded-[2rem] relative overflow-hidden group hover:border-white/20 transition-all cursor-default">
        <div className="relative z-10">
          <div className="flex justify-between items-start mb-4">
            <p className="text-[10px] text-gray-500 font-black uppercase tracking-widest">{title}</p>
            <div className="text-white/20 text-xl group-hover:text-gold transition-colors">
              <ion-icon name={icon}></ion-icon>
            </div>
          </div>
          <h3 className="text-2xl font-black mb-2 tracking-tighter">{value}</h3>
          <p className={`text-[10px] font-bold ${positive ? 'text-emerald-400' : 'text-gray-400'}`}>{trend}</p>
        </div>
      </div>
    );

    const LimitBar = ({ label, current, total, color }) => {
      const perc = (current / total) * 100;
      return (
        <div className="space-y-2">
          <div className="flex justify-between text-[10px] font-bold uppercase tracking-widest">
            <span className="text-gray-400">{label}</span>
            <span>{perc.toFixed(0)}%</span>
          </div>
          <div className="h-1.5 bg-white/5 rounded-full overflow-hidden">
            <div className={`h-full ${color} transition-all duration-1000 shadow-[0_0_10px_rgba(255,255,255,0.1)]`} style={{width: `${perc}%`}}></div>
          </div>
        </div>
      );
    };

    const SubscriptionsView = ({ currency }) => {
      const subs = [
        { name: 'Streaming Premium', price: 55.90, icon: 'film-outline', color: 'text-red-500' },
        { name: 'Cloud Storage Pro', price: 34.90, icon: 'cloud-done-outline', color: 'text-emerald-500' },
        { name: 'Workspace Business', price: 19.90, icon: 'briefcase-outline', color: 'text-sky-400' }
      ];

      return (
        <div className="space-y-8">
          <div className="flex justify-between items-end">
            <div>
              <h3 className="text-2xl font-black italic tracking-tighter">Assinaturas Ativas</h3>
              <p className="text-[10px] text-gray-500 font-bold uppercase mt-1 tracking-widest">Total Mensal: {currency} {subs.reduce((a,b)=>a+b.price, 0).toFixed(2)}</p>
            </div>
            <button className="btn-gold px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-lg shadow-gold/20">+ Nova</button>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            {subs.map((s, i) => (
              <div key={i} className="glass p-6 rounded-[2rem] flex items-center justify-between group border-transparent hover:border-yellow-500/20 transition-all">
                <div className="flex items-center gap-4">
                  <div className={`w-12 h-12 rounded-2xl bg-white/5 flex items-center justify-center text-2xl ${s.color} shadow-inner`}>
                    <ion-icon name={s.icon}></ion-icon>
                  </div>
                  <div>
                    <h4 className="font-bold text-sm tracking-tight">{s.name}</h4>
                    <p className="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Recorrente</p>
                  </div>
                </div>
                <div className="flex flex-col items-end gap-2">
                  <p className="text-lg font-black text-white">{currency} {s.price.toFixed(2)}</p>
                  <button className="text-[9px] font-black uppercase tracking-widest bg-white/5 px-3 py-1 rounded-lg text-gray-400 hover:text-white hover:bg-white/10 transition-all flex items-center gap-1">
                    <ion-icon name="create-outline"></ion-icon> Editar
                  </button>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    };

    const ChartsView = ({ currency }) => {
      const lineRef = useRef(null);
      useEffect(() => {
        const ctx = lineRef.current.getContext('2d');
        const chart = new Chart(ctx, {
          type: 'line',
          data: {
            labels: ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun'],
            datasets: [{
              data: [12000, 14500, 13800, 16200, 15400, 18500],
              borderColor: '#bf953f',
              borderWidth: 4,
              tension: 0.4,
              fill: true,
              backgroundColor: (context) => {
                const gradient = context.chart.ctx.createLinearGradient(0, 0, 0, 400);
                gradient.addColorStop(0, 'rgba(191, 149, 63, 0.1)');
                gradient.addColorStop(1, 'rgba(191, 149, 63, 0)');
                return gradient;
              },
              pointRadius: 0,
              pointHoverRadius: 6,
              pointHoverBackgroundColor: '#fcf6ba'
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { 
              y: { display: false }, 
              x: { grid: { display: false }, ticks: { color: '#444', font: { weight: 'bold', size: 10 } } } 
            }
          }
        });
        return () => chart.destroy();
      }, []);

      return (
        <div className="glass p-10 rounded-[3rem] h-[450px]">
          <h3 className="text-xl font-bold italic mb-10 tracking-tighter">Performance de Carteira</h3>
          <div className="h-[300px]">
            <canvas ref={lineRef}></canvas>
          </div>
        </div>
      );
    };

    const DebtsView = ({ currency }) => (
      <div className="glass p-10 rounded-[3rem] border-l-8 border-red-500/20 shadow-xl">
         <div className="flex justify-between items-start mb-6">
           <div>
             <h3 className="text-2xl font-black italic tracking-tighter">Cartão Black Platinum</h3>
             <p className="text-[10px] text-gray-500 font-bold uppercase tracking-widest mt-1">Limite utilizado: 42%</p>
           </div>
           <ion-icon name="card-outline" style={{fontSize: '32px', color: '#666'}}></ion-icon>
         </div>
         <div className="flex items-baseline gap-2">
            <span className="text-4xl font-black text-red-500">{currency} 8.450,00</span>
         </div>
         <p className="text-[10px] text-gray-500 font-bold uppercase mt-4 flex items-center gap-2">
            <ion-icon name="time-outline"></ion-icon> Fechamento da fatura em 72 horas
         </p>
         <button className="w-full mt-10 py-5 btn-gold rounded-2xl text-[10px] font-black uppercase tracking-[0.2em] shadow-lg shadow-gold/10">Quitar Débito Agora</button>
      </div>
    );

    const SettingsView = ({ theme, setTheme }) => (
      <div className="max-w-2xl space-y-8">
        <div className="glass p-10 rounded-[3rem]">
          <h3 className="text-xl font-bold italic mb-10 tracking-tighter">Preferências do Sistema</h3>
          <div className="space-y-10">
            <div className="flex flex-col gap-3">
              <label className="text-[10px] text-gray-500 font-black uppercase tracking-widest ml-1">Estética Visual</label>
              <div className="flex gap-3">
                {['Deep Black', 'Modern Light'].map(t => (
                  <button 
                    key={t}
                    onClick={() => setTheme(t)}
                    className={`flex-1 py-5 rounded-2xl font-bold transition-all text-xs tracking-widest uppercase ${theme === t ? 'btn-gold shadow-lg shadow-gold/20' : 'glass hover:bg-white/5'}`}
                  >
                    {t === 'Deep Black' ? 'Onyx Dark' : 'Quartz Light'}
                  </button>
                ))}
              </div>
            </div>

            <div className="p-8 bg-white/2 border border-white/5 rounded-[2.5rem]">
               <h4 className="text-[10px] font-black uppercase tracking-[0.3em] mb-8 text-gray-600">Gestão Avançada</h4>
               <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  <button className="py-4 glass rounded-xl text-[9px] font-black uppercase tracking-widest hover:text-white transition-all flex items-center justify-center gap-2">
                    <ion-icon name="cloud-download-outline"></ion-icon> Exportar Dados
                  </button>
                  <button className="py-4 glass rounded-xl text-[9px] font-black uppercase tracking-widest hover:text-white transition-all flex items-center justify-center gap-2">
                    <ion-icon name="shield-checkmark-outline"></ion-icon> Logs de Acesso
                  </button>
               </div>
            </div>
          </div>
        </div>
        <p className="text-center text-[10px] text-gray-600 font-bold uppercase tracking-[0.4em]">Build Version: 2.6.0-Gold</p>
      </div>
    );

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
