<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoneyForge Pro | Financial Intelligence</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap');
    
    :root {
      --gold-primary: #bf953f;
      --gold-secondary: #fcf6ba;
      --gold-tertiary: #b38728;
      --dark-bg: #0a0a0a;
      --glass-bg: rgba(18, 18, 18, 0.7);
      --glass-border: rgba(255, 255, 255, 0.12);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
    }

    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background: var(--dark-bg);
      color: #fff;
      min-height: 100vh;
    }

    /* Background Engine */
    .background-engine {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)), url('https://images.unsplash.com/photo-1639762681485-074b7f938ba0?q=80&w=2000&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
      z-index: -1;
    }

    /* Auth Interface */
    .auth-container {
      width: 100%;
      max-width: 540px;
      margin: auto;
      padding: clamp(2rem, 5vw, 4rem);
      background: rgba(15, 15, 15, 0.65);
      backdrop-filter: blur(40px) saturate(180%);
      border: 1px solid var(--glass-border);
      border-radius: clamp(1.5rem, 4vw, 3.5rem);
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8), inset 0 0 40px rgba(191, 149, 63, 0.05);
    }

    .gold-gradient-text {
      background: linear-gradient(to right, var(--gold-primary), var(--gold-secondary), var(--gold-tertiary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: inline-block;
    }

    .input-label {
      display: block;
      font-size: 10px;
      font-weight: 800;
      color: rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
      letter-spacing: 0.2em;
      margin-bottom: 8px;
    }

    .modern-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      border: 1.5px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      padding: 16px 20px;
      color: #fff;
      font-size: 15px;
      transition: all 0.4s ease;
    }

    .modern-input:focus {
      outline: none;
      border-color: var(--gold-primary);
      background: rgba(255, 255, 255, 0.07);
    }

    .btn-gold-action {
      width: 100%;
      padding: 18px;
      background: linear-gradient(180deg, var(--gold-secondary) 0%, var(--gold-primary) 100%);
      border: none;
      border-radius: 50px;
      color: #000;
      font-weight: 800;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: transform 0.3s;
    }

    .btn-gold-action:hover {
      transform: translateY(-2px);
    }

    /* Dashboard UI */
    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(30px);
      border: 1px solid var(--glass-border);
      border-radius: 30px;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 20px;
      border-radius: 18px;
      color: #64748b;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: all 0.3s;
      cursor: pointer;
    }

    .nav-link.active {
      background: rgba(191, 149, 63, 0.12);
      color: var(--gold-secondary);
    }

    .custom-scroll::-webkit-scrollbar { width: 4px; }
    .custom-scroll::-webkit-scrollbar-thumb { background: rgba(191, 149, 63, 0.3); border-radius: 10px; }

    .reveal {
      animation: revealAnim 0.7s cubic-bezier(0.23, 1, 0.32, 1) forwards;
    }

    @keyframes revealAnim {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    const App = () => {
      // States
      const [isLoggedIn, setIsLoggedIn] = useState(false);
      const [authView, setAuthView] = useState('login'); // login | signup
      const [loading, setLoading] = useState(false);
      const [activeTab, setActiveTab] = useState('dashboard');
      const [transactions, setTransactions] = useState([]);
      const [showModal, setShowModal] = useState(null);
      const [user, setUser] = useState({ firstName: 'Luis', plan: 'Membro Founder Elite' });

      // Mock Data Initialization
      useEffect(() => {
        const initialData = [
          { id: 1, desc: 'Assinatura Adobe Creative', val: 124.90, type: 'expense', cat: 'Design', date: '18/03/2024' },
          { id: 2, desc: 'Dividendos PETR4', val: 850.00, type: 'income', cat: 'Investimentos', date: '17/03/2024' },
          { id: 3, desc: 'Apple Services', val: 45.00, type: 'expense', cat: 'Software', date: '15/03/2024' },
          { id: 4, desc: 'Consultoria Estratégica', val: 4200.00, type: 'income', cat: 'Trabalho', date: '12/03/2024' }
        ];
        setTransactions(initialData);
      }, []);

      // Handlers
      const handleAuth = (e) => {
        e.preventDefault();
        setLoading(true);
        setTimeout(() => {
          setIsLoggedIn(true);
          setLoading(false);
        }, 1000);
      };

      const handleLogout = () => {
        setIsLoggedIn(false);
        setAuthView('login');
      };

      const dashboardStats = useMemo(() => {
        const income = transactions.filter(t => t.type === 'income').reduce((a, b) => a + b.val, 0);
        const expense = transactions.filter(t => t.type === 'expense').reduce((a, b) => a + b.val, 0);
        return { total: income - expense, income, expense };
      }, [transactions]);

      // --- LOGIN / SIGNUP SCREEN ---
      if (!isLoggedIn) {
        return (
          <div className="min-h-screen flex items-center justify-center p-4">
            <div className="background-engine"></div>
            <div className="auth-container reveal w-full">
              <div className="text-center mb-10 sm:mb-14">
                <h1 className="text-4xl sm:text-5xl font-extrabold tracking-tighter mb-4 italic">
                  Money<span className="gold-gradient-text">Forge</span>
                </h1>
                <div className="flex items-center justify-center gap-2">
                  <div className="h-[1px] w-6 sm:w-10 bg-white/10"></div>
                  <span className="text-[8px] sm:text-[10px] font-black uppercase tracking-[0.3em] text-white/40">
                    GESTÃO PATRIMONIAL ELITE
                  </span>
                  <div className="h-[1px] w-6 sm:w-10 bg-white/10"></div>
                </div>
              </div>

              <form onSubmit={handleAuth} className="space-y-4 sm:space-y-5">
                {authView === 'signup' && (
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 reveal">
                    <div>
                      <label className="input-label">Nome</label>
                      <input type="text" className="modern-input" placeholder="Ex: Luis" required />
                    </div>
                    <div>
                      <label className="input-label">Sobrenome</label>
                      <input type="text" className="modern-input" placeholder="Ex: Campos" required />
                    </div>
                  </div>
                )}

                <div>
                  <label className="input-label">E-mail Corporativo</label>
                  <input type="email" className="modern-input" placeholder="seu@email.com" required />
                </div>

                <div>
                  <div className="flex justify-between items-center mb-2">
                    <label className="input-label mb-0">Senha</label>
                  </div>
                  <input type="password" className="modern-input" placeholder="••••••••" required />
                </div>

                <button type="submit" disabled={loading} className="btn-gold-action mt-6 group">
                  {loading ? "Processando..." : (authView === 'login' ? 'Entrar no Sistema' : 'Criar Conta Premium')}
                </button>
              </form>

              <div className="mt-12 text-center">
                <p className="text-[9px] font-bold text-white/20 uppercase tracking-widest mb-3">
                  {authView === 'login' ? 'Ainda não é membro?' : 'Já possui acesso?'}
                </p>
                <button 
                  onClick={() => setAuthView(authView === 'login' ? 'signup' : 'login')}
                  className="gold-gradient-text text-[10px] sm:text-[11px] font-black uppercase tracking-widest hover:brightness-125 transition-all"
                >
                  {authView === 'login' ? 'Solicitar Acesso Agora' : 'Voltar para o Login'}
                </button>
              </div>
            </div>
          </div>
        );
      }

      // --- MAIN DASHBOARD VIEW ---
      return (
        <div className="flex h-screen bg-[#050505] overflow-hidden p-0 md:p-6 gap-6 relative">
          <div className="background-engine opacity-20"></div>
          
          {/* Sidebar */}
          <aside className="hidden lg:flex w-80 h-full glass-panel flex-col p-8 reveal shrink-0">
            <div className="mb-12">
              <h2 className="text-2xl font-black italic tracking-tighter">Money<span className="gold-gradient-text">Forge</span></h2>
              <p className="text-[9px] text-white/20 font-bold uppercase tracking-[0.2em] mt-1">Intelligence Division</p>
            </div>

            <nav className="flex-1 space-y-1 overflow-y-auto custom-scroll">
              <p className="text-[9px] font-black text-white/10 uppercase tracking-[0.3em] mt-8 mb-3 ml-4">Menu Principal</p>
              <NavLink label="Dashboard" icon="grid-outline" active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} />
              <NavLink label="Fluxo de Caixa" icon="swap-horizontal-outline" active={activeTab === 'transactions'} onClick={() => setActiveTab('transactions')} />
              
              <p className="text-[9px] font-black text-white/10 uppercase tracking-[0.3em] mt-8 mb-3 ml-4">Estratégico</p>
              <NavLink label="Patrimônio" icon="trending-up-outline" active={activeTab === 'investments'} onClick={() => setActiveTab('investments')} />
              <NavLink label="Planejamento" icon="flag-outline" active={activeTab === 'goals'} onClick={() => setActiveTab('goals')} />
              
              <p className="text-[9px] font-black text-white/10 uppercase tracking-[0.3em] mt-8 mb-3 ml-4">Sistema</p>
              <NavLink label="Configurações" icon="settings-outline" active={activeTab === 'settings'} onClick={() => setActiveTab('settings')} />
            </nav>

            <div className="mt-8 pt-6 border-t border-white/5">
              <button 
                onClick={handleLogout}
                className="w-full flex items-center gap-4 px-6 py-4 rounded-2xl hover:bg-red-500/10 text-red-500 transition-all text-[11px] font-black uppercase tracking-widest"
              >
                <ion-icon name="power-outline"></ion-icon> Desconectar
              </button>
            </div>
          </aside>

          {/* Content Area */}
          <main className="flex-1 flex flex-col gap-6 h-full p-4 md:p-0 overflow-y-auto custom-scroll">
            <header className="glass-panel p-6 flex justify-between items-center reveal shrink-0">
              <div className="flex items-center gap-4">
                <div className="w-12 h-12 rounded-2xl bg-gradient-to-br from-zinc-800 to-zinc-900 border border-white/5 flex items-center justify-center font-bold text-gold-primary">
                  {user.firstName.charAt(0)}
                </div>
                <div>
                  <h3 className="font-bold text-sm sm:text-base tracking-tight">Bem-vindo, {user.firstName}</h3>
                  <p className="text-[9px] text-white/30 font-bold uppercase tracking-widest">{user.plan}</p>
                </div>
              </div>
              <div className="flex gap-4">
                <button onClick={() => setShowModal('tx')} className="btn-gold-action !py-3 px-6 !w-auto text-[10px]">
                  <ion-icon name="add"></ion-icon> Lançar
                </button>
                <button onClick={handleLogout} className="lg:hidden p-3 text-red-500 border border-red-500/20 rounded-2xl bg-red-500/5">
                  <ion-icon name="log-out-outline" style={{fontSize: '20px'}}></ion-icon>
                </button>
              </div>
            </header>

            <div className="flex-1">
              {activeTab === 'dashboard' ? (
                <DashboardComponent stats={dashboardStats} transactions={transactions} />
              ) : (
                <div className="glass-panel p-10 reveal">
                  <h3 className="text-xl font-black italic mb-8 uppercase tracking-widest">Seção: {activeTab}</h3>
                  <p className="text-white/40">Módulo em desenvolvimento para sua conta premium.</p>
                </div>
              )}
            </div>
          </main>

          {showModal === 'tx' && (
            <TransactionModal 
              onClose={() => setShowModal(null)} 
              onSave={(t) => {setTransactions([t, ...transactions]); setShowModal(null);}} 
            />
          )}
        </div>
      );
    };

    // --- SUBCOMPONENTS ---

    const NavLink = ({ label, icon, active, onClick }) => (
      <div onClick={onClick} className={`nav-link ${active ? 'active' : ''}`}>
        <ion-icon name={icon} style={{fontSize: '18px'}}></ion-icon>
        <span>{label}</span>
      </div>
    );

    const DashboardComponent = ({ stats, transactions }) => (
      <div className="space-y-6 reveal pb-10">
        <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6">
          <StatCard title="Disponível" value={stats.total} icon="wallet-outline" color="text-white" trend="+3.2%" />
          <StatCard title="Proventos" value={stats.income} icon="arrow-up-circle-outline" color="text-emerald-500" trend="+8.4%" />
          <StatCard title="Despesas" value={stats.expense} icon="arrow-down-circle-outline" color="text-red-500" trend="-1.2%" />
        </div>

        <div className="grid grid-cols-1 xl:grid-cols-5 gap-6">
          <div className="xl:col-span-3 glass-panel p-10 h-[400px]">
             <h4 className="text-[10px] font-black uppercase tracking-widest text-white/30 italic mb-8">Performance Semestral</h4>
             <FinancialChart />
          </div>
          <div className="xl:col-span-2 glass-panel p-10">
             <h4 className="text-[10px] font-black uppercase tracking-widest text-white/30 italic mb-8">Objetivos Estratégicos</h4>
             <div className="space-y-8">
               <ProgressBar label="Liberdade Financeira" progress={72} color="bg-gold-primary" />
               <ProgressBar label="Aposentadoria" progress={45} color="bg-blue-500" />
               <ProgressBar label="Reserva de Ouro" progress={18} color="bg-emerald-500" />
             </div>
          </div>
        </div>

        <div className="glass-panel p-10">
          <h4 className="text-[10px] font-black uppercase tracking-widest text-white/30 italic mb-8">Últimas Transações</h4>
          <div className="space-y-4">
            {transactions.slice(0, 5).map(t => (
              <div key={t.id} className="flex items-center justify-between p-5 bg-white/[0.02] border border-white/5 rounded-2xl hover:border-white/10 transition-all">
                <div className="flex items-center gap-5">
                  <div className={`w-12 h-12 rounded-2xl flex items-center justify-center text-lg ${t.type === 'income' ? 'text-emerald-500 bg-emerald-500/10' : 'text-white bg-white/5'}`}>
                    <ion-icon name={t.type === 'income' ? 'add-circle-outline' : 'remove-circle-outline'}></ion-icon>
                  </div>
                  <div>
                    <p className="font-bold text-sm">{t.desc}</p>
                    <p className="text-[10px] text-white/20 font-black uppercase tracking-widest mt-1">{t.cat} • {t.date}</p>
                  </div>
                </div>
                <p className={`font-black text-base ${t.type === 'income' ? 'text-emerald-500' : 'text-white'}`}>
                  {t.type === 'income' ? '+' : '-'} R$ {t.val.toLocaleString('pt-BR')}
                </p>
              </div>
            ))}
          </div>
        </div>
      </div>
    );

    const StatCard = ({ title, value, icon, color, trend }) => (
      <div className="glass-panel p-8 group hover:border-gold-primary/30 transition-all">
        <div className="flex justify-between items-start mb-6">
          <p className="text-[9px] text-white/30 font-black uppercase tracking-[0.3em]">{title}</p>
          <div className={`text-2xl opacity-20 group-hover:opacity-100 transition-opacity ${color}`}><ion-icon name={icon}></ion-icon></div>
        </div>
        <div className="flex items-end justify-between">
          <h3 className="text-3xl font-black tracking-tighter">R$ {value.toLocaleString('pt-BR')}</h3>
          <span className={`text-[10px] font-black px-3 py-1 rounded-full bg-white/5 ${trend.startsWith('+') ? 'text-emerald-500' : 'text-red-500'}`}>{trend}</span>
        </div>
      </div>
    );

    const ProgressBar = ({ label, progress, color }) => (
      <div className="space-y-3">
        <div className="flex justify-between text-[11px] font-bold uppercase tracking-widest">
          <span>{label}</span>
          <span className="text-white/40">{progress}%</span>
        </div>
        <div className="h-1.5 w-full bg-white/5 rounded-full overflow-hidden">
          <div className={`h-full ${color} rounded-full transition-all duration-1000`} style={{width: `${progress}%`}}></div>
        </div>
      </div>
    );

    const FinancialChart = () => {
      const chartRef = useRef(null);
      useEffect(() => {
        const ctx = chartRef.current.getContext('2d');
        const chart = new Chart(ctx, {
          type: 'line',
          data: {
            labels: ['JAN', 'FEV', 'MAR', 'ABR', 'MAI', 'JUN'],
            datasets: [{
              data: [15000, 18500, 16200, 21000, 19800, 24500],
              borderColor: '#bf953f',
              borderWidth: 4,
              tension: 0.4,
              pointRadius: 0,
              fill: true,
              backgroundColor: 'rgba(191, 149, 63, 0.05)'
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { 
              x: { grid: { display: false }, border: { display: false }, ticks: { color: 'rgba(255,255,255,0.2)', font: { size: 9, weight: '800' } } },
              y: { display: false }
            }
          }
        });
        return () => chart.destroy();
      }, []);
      return <div className="h-full w-full"><canvas ref={chartRef}></canvas></div>;
    };

    const TransactionModal = ({ onClose, onSave }) => {
      const [f, setF] = useState({ desc: '', val: '', type: 'expense', cat: 'Operacional' });
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/90 backdrop-blur-md" onClick={onClose}>
          <div className="auth-container !max-w-md !p-12 reveal" onClick={e => e.stopPropagation()}>
            <h3 className="text-xl font-black italic mb-10 tracking-tighter">Novo <span className="gold-gradient-text">Registro</span></h3>
            <div className="space-y-5">
              <div>
                <label className="input-label">Descrição</label>
                <input type="text" className="modern-input" placeholder="Ex: Compra de Ativo" value={f.desc} onChange={e => setF({...f, desc: e.target.value})} />
              </div>
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="input-label">Valor (R$)</label>
                  <input type="number" className="modern-input" placeholder="0.00" value={f.val} onChange={e => setF({...f, val: e.target.value})} />
                </div>
                <div>
                  <label className="input-label">Natureza</label>
                  <select className="modern-input" value={f.type} onChange={e => setF({...f, type: e.target.value})}>
                    <option value="expense">Saída</option>
                    <option value="income">Entrada</option>
                  </select>
                </div>
              </div>
              <button 
                className="btn-gold-action !mt-8" 
                onClick={() => {
                  if(!f.desc || !f.val) return;
                  onSave({ ...f, val: parseFloat(f.val), id: Date.now(), date: '18/03/24' });
                }}
              >
                Confirmar Lançamento
              </button>
            </div>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
