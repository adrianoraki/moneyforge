<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoneyForge Pro | Financial Intelligence</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap');
    
    :root {
      --gold-primary: #bf953f;
      --gold-secondary: #fcf6ba;
      --gold-tertiary: #b38728;
      --dark-bg: #0a0a0a;
      --glass-bg: rgba(18, 18, 18, 0.7);
      --glass-border: rgba(255, 255, 255, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
    }

    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background: var(--dark-bg);
      color: #fff;
      height: 100vh;
      overflow: hidden;
    }

    /* Background Layer */
    .app-viewport {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    .background-engine {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.85)), url('fundo.png');
      background-size: cover;
      background-position: center;
      z-index: -1;
      transform: scale(1.1);
      filter: blur(2px);
    }

    /* Auth Interface Components */
    .auth-container {
      width: 100%;
      max-width: 520px;
      padding: 60px;
      background: rgba(15, 15, 15, 0.65);
      backdrop-filter: blur(40px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 50px;
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8), inset 0 0 40px rgba(191, 149, 63, 0.05);
      transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .gold-gradient-text {
      background: linear-gradient(to right, var(--gold-primary), var(--gold-secondary), var(--gold-tertiary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: inline-block;
    }

    .input-wrapper {
      position: relative;
      margin-bottom: 24px;
    }

    .input-label {
      display: block;
      font-size: 10px;
      font-weight: 800;
      color: rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
      letter-spacing: 0.2em;
      margin-bottom: 10px;
      margin-left: 6px;
    }

    .modern-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      border: 1.5px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 18px 24px;
      color: #fff;
      font-size: 15px;
      font-weight: 500;
      transition: all 0.4s ease;
    }

    .modern-input:focus {
      outline: none;
      background: rgba(255, 255, 255, 0.07);
      border-color: var(--gold-primary);
      box-shadow: 0 0 20px rgba(191, 149, 63, 0.15);
    }

    .btn-gold-action {
      position: relative;
      width: 100%;
      padding: 20px;
      background: linear-gradient(180deg, var(--gold-secondary) 0%, var(--gold-primary) 100%);
      border: none;
      border-radius: 50px;
      color: #000;
      font-weight: 800;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .btn-gold-action:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 15px 30px rgba(191, 149, 63, 0.4);
    }

    .btn-gold-action:active {
      transform: translateY(0);
    }

    /* Dashboard UI Elements */
    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(30px);
      border: 1px solid var(--glass-border);
      border-radius: 35px;
      transition: all 0.3s ease;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 24px;
      border-radius: 20px;
      color: #64748b;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: all 0.3s;
      cursor: pointer;
    }

    .nav-link.active {
      background: rgba(191, 149, 63, 0.12);
      color: var(--gold-secondary);
    }

    .nav-link:hover:not(.active) {
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
    }

    /* Animations */
    .reveal {
      animation: revealAnim 0.8s cubic-bezier(0.23, 1, 0.32, 1) forwards;
    }

    @keyframes revealAnim {
      from { opacity: 0; transform: translateY(30px); filter: blur(10px); }
      to { opacity: 1; transform: translateY(0); filter: blur(0); }
    }

    /* Custom Scrollbar */
    .custom-scroll::-webkit-scrollbar { width: 4px; }
    .custom-scroll::-webkit-scrollbar-track { background: transparent; }
    .custom-scroll::-webkit-scrollbar-thumb { background: rgba(191, 149, 63, 0.3); border-radius: 10px; }

    /* Icons and Utils */
    ion-icon { vertical-align: middle; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    const App = () => {
      // States
      const [isLoggedIn, setIsLoggedIn] = useState(false);
      const [authView, setAuthView] = useState('login'); // login | signup
      const [loading, setLoading] = useState(false);
      const [activeTab, setActiveTab] = useState('dashboard');
      const [transactions, setTransactions] = useState([]);
      const [showModal, setShowModal] = useState(null);
      
      // User Context
      const [userData, setUserData] = useState({
        firstName: 'Luis',
        lastName: 'Campos',
        email: 'luis.campos@moneyforge.pro',
        plan: 'Black Edition'
      });

      // Initialization
      useEffect(() => {
        const initialData = [
          { id: 1, desc: 'Assinatura Adobe Creative', val: 124.90, type: 'expense', cat: 'Design', date: '18/03/2024' },
          { id: 2, desc: 'Dividendos PETR4', val: 850.00, type: 'income', cat: 'Investimentos', date: '17/03/2024' },
          { id: 3, desc: 'Apple Services', val: 45.00, type: 'expense', cat: 'Software', date: '15/03/2024' },
          { id: 4, desc: 'Consultoria Estratégica', val: 4200.00, type: 'income', cat: 'Trabalho', date: '12/03/2024' }
        ];
        setTransactions(initialData);
      }, []);

      const handleAuth = (e) => {
        e.preventDefault();
        setLoading(true);
        // Simulate detailed auth process
        setTimeout(() => {
          setIsLoggedIn(true);
          setLoading(false);
        }, 1200);
      };

      const handleLogout = () => {
        setIsLoggedIn(false);
        setAuthView('login');
      };

      // Component Logic
      const dashboardStats = useMemo(() => {
        const income = transactions.filter(t => t.type === 'income').reduce((a, b) => a + b.val, 0);
        const expense = transactions.filter(t => t.type === 'expense').reduce((a, b) => a + b.val, 0);
        return { total: income - expense, income, expense };
      }, [transactions]);

      // Views
      if (!isLoggedIn) {
        return (
          <div className="app-viewport flex items-center justify-center p-6 h-screen overflow-hidden">
            <div className="background-engine"></div>
            
            <div className="auth-container reveal">
              <div className="text-center mb-16">
                <h1 className="text-5xl font-extrabold tracking-tighter mb-4 italic">
                  Money<span className="gold-gradient-text">Forge</span>
                </h1>
                <div className="flex items-center justify-center gap-2">
                  <div className="h-[1px] w-8 bg-white/10"></div>
                  <span className="text-[10px] font-black uppercase tracking-[0.4em] text-white/40">
                    SISTEMA DE GESTÃO PATRIMONIAL
                  </span>
                  <div className="h-[1px] w-8 bg-white/10"></div>
                </div>
              </div>

              <form onSubmit={handleAuth} className="space-y-4">
                {authView === 'signup' && (
                  <div className="grid grid-cols-2 gap-4 reveal">
                    <div className="input-wrapper">
                      <label className="input-label">Nome</label>
                      <input type="text" className="modern-input" placeholder="Luis" required />
                    </div>
                    <div className="input-wrapper">
                      <label className="input-label">Sobrenome</label>
                      <input type="text" className="modern-input" placeholder="Campos" required />
                    </div>
                  </div>
                )}

                <div className="input-wrapper">
                  <label className="input-label">Endereço de E-mail</label>
                  <input type="email" className="modern-input" placeholder="exemplo@dominio.com" required />
                </div>

                <div className="input-wrapper">
                  <div className="flex justify-between items-center mb-2">
                    <label className="input-label mb-0">Senha de Acesso</label>
                    {authView === 'login' && <span className="text-[9px] font-bold text-white/30 cursor-pointer hover:text-white transition-colors">Esqueceu a senha?</span>}
                  </div>
                  <div className="relative">
                    <input type="password" className="modern-input" placeholder="••••••••" required />
                    <button type="button" className="absolute right-5 top-1/2 -translate-y-1/2 text-white/20 hover:text-white transition-colors">
                      <ion-icon name="eye-outline"></ion-icon>
                    </button>
                  </div>
                </div>

                <button type="submit" disabled={loading} className="btn-gold-action group mt-8">
                  {loading ? (
                    <div className="w-5 h-5 border-2 border-black/20 border-t-black rounded-full animate-spin"></div>
                  ) : (
                    <>
                      <span>{authView === 'login' ? 'Autenticar no Sistema' : 'Criar Conta Premium'}</span>
                      <ion-icon name="chevron-forward-outline" class="group-hover:translate-x-1 transition-transform"></ion-icon>
                    </>
                  )}
                </button>
              </form>

              <div className="mt-14 text-center">
                <p className="text-[10px] font-bold text-white/30 uppercase tracking-widest mb-4">
                  {authView === 'login' ? 'Novo por aqui?' : 'Já possui acesso?'}
                </p>
                <button 
                  onClick={() => setAuthView(authView === 'login' ? 'signup' : 'login')}
                  className="gold-gradient-text text-[11px] font-black uppercase tracking-widest hover:opacity-80 transition-opacity"
                >
                  {authView === 'login' ? 'Inicie seu Cadastro Agora' : 'Voltar para o Login'}
                </button>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="app-viewport h-screen bg-[#050505] p-6 gap-6">
          <div className="background-engine opacity-40"></div>
          
          {/* Sidebar Navigation */}
          <aside className="w-80 h-full glass-panel flex flex-col p-8 reveal">
            <div className="mb-12">
              <h2 className="text-2xl font-black italic tracking-tighter">Money<span className="gold-gradient-text">Forge</span></h2>
              <p className="text-[9px] text-white/20 font-bold uppercase tracking-[0.2em] mt-1">Intelligence Division</p>
            </div>

            <nav className="flex-1 space-y-2 overflow-y-auto custom-scroll pr-2">
              <NavHeader title="Gestão de Ativos" />
              <NavLink label="Dashboard" icon="grid-outline" active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} />
              <NavLink label="Fluxo de Caixa" icon="swap-horizontal-outline" active={activeTab === 'transactions'} onClick={() => setActiveTab('transactions')} />
              
              <NavHeader title="Planejamento" />
              <NavLink label="Investimentos" icon="trending-up-outline" active={activeTab === 'investments'} onClick={() => setActiveTab('investments')} />
              <NavLink label="Metas Financeiras" icon="flag-outline" active={activeTab === 'goals'} onClick={() => setActiveTab('goals')} />
              
              <NavHeader title="Preferências" />
              <NavLink label="Minha Assinatura" icon="diamond-outline" active={activeTab === 'billing'} onClick={() => setActiveTab('billing')} />
              <NavLink label="Configurações" icon="settings-outline" active={activeTab === 'settings'} onClick={() => setActiveTab('settings')} />
            </nav>

            <div className="mt-8 pt-6 border-t border-white/5">
              <button 
                onClick={handleLogout}
                className="w-full flex items-center gap-4 px-6 py-4 rounded-2xl bg-red-500/5 hover:bg-red-500/10 text-red-500 transition-all text-[11px] font-black uppercase tracking-widest"
              >
                <ion-icon name="log-out-outline" style={{fontSize: '20px'}}></ion-icon> Finalizar Sessão
              </button>
            </div>
          </aside>

          {/* Main Content Area */}
          <main className="flex-1 flex flex-col gap-6 h-full">
            <header className="w-full glass-panel p-6 flex justify-between items-center reveal">
              <div className="flex items-center gap-5">
                <div className="w-14 h-14 rounded-2xl btn-gold-action !w-14 !p-0 shadow-lg text-lg">LC</div>
                <div>
                  <h3 className="font-bold text-lg tracking-tight">Status: <span className="gold-gradient-text">Premium Account</span></h3>
                  <p className="text-[10px] text-white/30 font-bold uppercase tracking-widest">Seja bem-vindo, {userData.firstName} {userData.lastName}</p>
                </div>
              </div>
              <div className="flex gap-4">
                <button className="glass-panel px-6 py-3 border-white/5 hover:bg-white/5 transition-all text-[10px] font-bold uppercase tracking-widest flex items-center gap-3">
                  <ion-icon name="notifications-outline" style={{fontSize: '18px'}}></ion-icon> Alertas
                </button>
                <button 
                  onClick={() => setShowModal('tx')}
                  className="btn-gold-action !py-3 px-8 text-[10px]"
                >
                  <ion-icon name="add-outline"></ion-icon> Novo Lançamento
                </button>
              </div>
            </header>

            <div className="flex-1 overflow-y-auto custom-scroll pr-2 space-y-6">
              {activeTab === 'dashboard' && <DashboardView stats={dashboardStats} transactions={transactions} />}
              {activeTab === 'transactions' && <TransactionsView transactions={transactions} />}
              {activeTab !== 'dashboard' && activeTab !== 'transactions' && <PlaceholderView tab={activeTab} />}
            </div>
          </main>

          {showModal === 'tx' && <NewTransactionModal onClose={() => setShowModal(null)} onSave={(t) => {setTransactions([t, ...transactions]); setShowModal(null);}} />}
        </div>
      );
    };

    // Sub-Components
    const NavHeader = ({ title }) => (
      <p className="text-[9px] font-black text-white/10 uppercase tracking-[0.3em] mt-8 mb-4 ml-4">{title}</p>
    );

    const NavLink = ({ label, icon, active, onClick }) => (
      <div onClick={onClick} className={`nav-link ${active ? 'active' : ''}`}>
        <ion-icon name={icon} style={{fontSize: '20px'}}></ion-icon>
        <span>{label}</span>
      </div>
    );

    const DashboardView = ({ stats, transactions }) => (
      <div className="space-y-6 reveal">
        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
          <StatPanel title="Capital Disponível" value={stats.total} icon="wallet-outline" color="text-white" trend="+5.2%" />
          <StatPanel title="Proventos Acumulados" value={stats.income} icon="trending-up-outline" color="text-emerald-500" trend="+12%" />
          <StatPanel title="Despesas Correntes" value={stats.expense} icon="trending-down-outline" color="text-red-500" trend="-3.5%" />
        </div>

        <div className="grid grid-cols-1 lg:grid-cols-5 gap-6">
          <div className="lg:col-span-3 glass-panel p-10 h-[450px]">
            <div className="flex justify-between items-center mb-10">
              <h4 className="text-[11px] font-black uppercase tracking-widest text-white/30 italic">Performance Trimestral</h4>
              <div className="flex gap-2">
                {['MÊS', 'TRIM', 'ANO'].map(p => <button key={p} className="px-3 py-1 bg-white/5 rounded text-[9px] font-bold text-white/40 hover:text-white">{p}</button>)}
              </div>
            </div>
            <ChartComponent />
          </div>
          
          <div className="lg:col-span-2 glass-panel p-10 h-[450px] flex flex-col">
            <h4 className="text-[11px] font-black uppercase tracking-widest text-white/30 italic mb-10">Metas de Longo Prazo</h4>
            <div className="flex-1 space-y-10">
              <GoalItem label="Independência Financeira" progress={65} target="R$ 1.5M" color="bg-emerald-500" />
              <GoalItem label="Novo Portfólio Imobiliário" progress={28} target="R$ 450k" color="bg-gold-primary" />
              <GoalItem label="Reserva de Emergência" progress={92} target="R$ 80k" color="bg-blue-500" />
            </div>
          </div>
        </div>

        <div className="glass-panel p-10">
          <h4 className="text-[11px] font-black uppercase tracking-widest text-white/30 italic mb-8">Movimentações Recentes</h4>
          <div className="space-y-4">
            {transactions.slice(0, 5).map(t => (
              <div key={t.id} className="flex items-center justify-between p-5 bg-white/[0.02] border border-white/5 rounded-3xl hover:bg-white/[0.04] transition-all">
                <div className="flex items-center gap-5">
                  <div className={`w-12 h-12 rounded-2xl flex items-center justify-center text-xl ${t.type === 'income' ? 'bg-emerald-500/10 text-emerald-500' : 'bg-red-500/10 text-red-500'}`}>
                    <ion-icon name={t.type === 'income' ? 'chevron-up-outline' : 'chevron-down-outline'}></ion-icon>
                  </div>
                  <div>
                    <p className="font-bold text-sm tracking-tight">{t.desc}</p>
                    <p className="text-[10px] text-white/20 font-bold uppercase tracking-widest">{t.cat} • {t.date}</p>
                  </div>
                </div>
                <div className="text-right">
                  <p className={`font-black text-lg ${t.type === 'income' ? 'text-emerald-500' : 'text-white'}`}>
                    {t.type === 'income' ? '+' : '-'} R$ {t.val.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
                  </p>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    );

    const StatPanel = ({ title, value, icon, color, trend }) => (
      <div className="glass-panel p-8 group hover:border-gold-primary/30 transition-all cursor-default">
        <div className="flex justify-between items-start mb-6">
          <p className="text-[10px] text-white/40 font-black uppercase tracking-widest italic">{title}</p>
          <div className={`text-2xl opacity-20 group-hover:opacity-100 transition-all ${color}`}>
            <ion-icon name={icon}></ion-icon>
          </div>
        </div>
        <div className="flex items-end justify-between">
          <h3 className="text-3xl font-black tracking-tighter">R$ {value.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</h3>
          <span className={`text-[10px] font-black ${trend.startsWith('+') ? 'text-emerald-500' : 'text-red-500'}`}>{trend}</span>
        </div>
      </div>
    );

    const GoalItem = ({ label, progress, target, color }) => (
      <div className="space-y-4">
        <div className="flex justify-between items-end">
          <div>
            <p className="text-sm font-bold tracking-tight">{label}</p>
            <p className="text-[9px] text-white/20 font-black uppercase tracking-widest">Alvo: {target}</p>
          </div>
          <span className="text-xs font-black text-white/40">{progress}%</span>
        </div>
        <div className="h-1.5 w-full bg-white/5 rounded-full overflow-hidden">
          <div className={`h-full ${color} rounded-full shadow-[0_0_15px_rgba(255,255,255,0.1)] transition-all duration-1000`} style={{width: `${progress}%`}}></div>
        </div>
      </div>
    );

    const ChartComponent = () => {
      const chartRef = useRef(null);
      useEffect(() => {
        const ctx = chartRef.current.getContext('2d');
        const gradient = ctx.createLinearGradient(0, 0, 0, 300);
        gradient.addColorStop(0, 'rgba(191, 149, 63, 0.2)');
        gradient.addColorStop(1, 'rgba(191, 149, 63, 0)');

        const chart = new Chart(ctx, {
          type: 'line',
          data: {
            labels: ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun'],
            datasets: [{
              data: [35000, 42000, 38000, 52000, 48000, 65000],
              borderColor: '#bf953f',
              borderWidth: 4,
              fill: true,
              backgroundColor: gradient,
              tension: 0.4,
              pointRadius: 0
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              x: { grid: { display: false }, ticks: { color: 'rgba(255,255,255,0.2)', font: { size: 10, weight: 'bold' } } },
              y: { display: false }
            }
          }
        });
        return () => chart.destroy();
      }, []);
      return <div className="h-64"><canvas ref={chartRef}></canvas></div>;
    };

    const TransactionsView = ({ transactions }) => (
      <div className="glass-panel p-10 reveal">
        <h3 className="text-2xl font-black italic tracking-tighter mb-10">Extrato <span className="gold-gradient-text">Consolidado</span></h3>
        <table className="w-full">
          <thead>
            <tr className="border-b border-white/5 text-left">
              <th className="pb-6 text-[10px] font-black uppercase tracking-widest text-white/20">Identificação</th>
              <th className="pb-6 text-[10px] font-black uppercase tracking-widest text-white/20">Data</th>
              <th className="pb-6 text-[10px] font-black uppercase tracking-widest text-white/20">Categoria</th>
              <th className="pb-6 text-right text-[10px] font-black uppercase tracking-widest text-white/20">Valor Líquido</th>
            </tr>
          </thead>
          <tbody className="divide-y divide-white/5">
            {transactions.map(t => (
              <tr key={t.id} className="group hover:bg-white/[0.02] transition-colors">
                <td className="py-6 font-bold text-sm">{t.desc}</td>
                <td className="py-6 text-sm text-white/40">{t.date}</td>
                <td className="py-6">
                  <span className="px-4 py-1.5 bg-white/5 rounded-full text-[9px] font-black uppercase text-white/40 tracking-widest">
                    {t.cat}
                  </span>
                </td>
                <td className={`py-6 text-right font-black text-lg ${t.type === 'income' ? 'text-emerald-500' : 'text-white'}`}>
                  {t.type === 'income' ? '+' : '-'} R$ {t.val.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    );

    const PlaceholderView = ({ tab }) => (
      <div className="glass-panel p-20 flex flex-col items-center justify-center text-center reveal">
        <div className="w-32 h-32 rounded-full bg-white/5 flex items-center justify-center text-4xl text-gold-primary mb-8 border border-white/10">
          <ion-icon name="construct-outline"></ion-icon>
        </div>
        <h3 className="text-2xl font-black italic mb-4 uppercase tracking-widest">Módulo em <span className="gold-gradient-text">Desenvolvimento</span></h3>
        <p className="max-w-md text-white/30 text-sm font-medium leading-relaxed">
          A seção de <b>{tab.toUpperCase()}</b> está sendo otimizada para fornecer a melhor experiência de análise preditiva do mercado.
        </p>
      </div>
    );

    const NewTransactionModal = ({ onClose, onSave }) => {
      const [f, setF] = useState({ desc: '', val: '', type: 'expense', cat: 'Geral' });
      return (
        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/90 backdrop-blur-md" onClick={onClose}>
          <div className="auth-container !max-w-md !p-12 reveal" onClick={e => e.stopPropagation()}>
            <h3 className="text-2xl font-black italic mb-10 tracking-tighter">Registrar <span className="gold-gradient-text">Transação</span></h3>
            <div className="space-y-6">
              <div className="input-wrapper">
                <label className="input-label">Descrição do Lançamento</label>
                <input type="text" className="modern-input" placeholder="Ex: Jantar de Negócios" value={f.desc} onChange={e => setF({...f, desc: e.target.value})} />
              </div>
              <div className="grid grid-cols-2 gap-4">
                <div className="input-wrapper">
                  <label className="input-label">Valor (R$)</label>
                  <input type="number" className="modern-input" placeholder="0,00" value={f.val} onChange={e => setF({...f, val: e.target.value})} />
                </div>
                <div className="input-wrapper">
                  <label className="input-label">Fluxo</label>
                  <select className="modern-input" value={f.type} onChange={e => setF({...f, type: e.target.value})}>
                    <option value="expense">Saída (-)</option>
                    <option value="income">Entrada (+)</option>
                  </select>
                </div>
              </div>
              <button 
                className="btn-gold-action"
                onClick={() => onSave({ ...f, val: parseFloat(f.val), id: Date.now(), date: new Date().toLocaleDateString('pt-BR') })}
              >
                Efetivar Lançamento
              </button>
            </div>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
