<!DOCTYPE html>
<html lang="pt-pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoneyForge - Painel Financeiro Premium</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@17/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
    
    body, html { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      color: white;
      background: linear-gradient(rgba(5, 5, 5, 0.92), rgba(5, 5, 5, 0.95)), url('./fundo.png');
      background-size: cover;
      background-attachment: fixed;
      background-position: center;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(191, 149, 63, 0.3); border-radius: 10px; }

    .glass-effect {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .gold-gradient-text {
      background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .gold-button {
      background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728);
      color: #000;
      font-weight: 700;
      transition: all 0.3s ease;
    }

    .sidebar-transition {
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .nav-item {
      transition: all 0.2s ease;
      cursor: pointer;
      border-radius: 14px;
    }

    .nav-item:hover, .nav-item.active {
      background: rgba(191, 149, 63, 0.15);
      color: #facc15;
    }

    .status-pago { color: #10b981; background: rgba(16, 185, 129, 0.1); }
    .status-pendente { color: #f59e0b; background: rgba(245, 158, 11, 0.1); }
    .status-atrasado { color: #ef4444; background: rgba(239, 68, 68, 0.1); }

    .fade-in {
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .drawer-overlay {
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const SUPABASE_URL = "https://bicljinwvfmmjllnshcd.supabase.co"; 
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJpY2xqaW53dmZtbWpsbG5zaGNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4Mzc3MDcsImV4cCI6MjA4OTQxMzcwN30.4YbAXUNq79BueSwct3RYKRI0eNJ0pWxMzM_VGTlhz6Q";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const App = () => {
      const [user, setUser] = useState(null);
      const [activeTab, setActiveTab] = useState('dashboard');
      const [isSidebarOpen, setIsSidebarOpen] = useState(false);
      const [transactions, setTransactions] = useState([]);
      const [goals, setGoals] = useState([
        { id: 1, name: 'Reserva de Emergência', target: 5000, current: 1850 },
        { id: 2, name: 'Nova Casa', target: 50000, current: 5200 }
      ]);

      useEffect(() => {
        supabaseClient.auth.getSession().then(({ data: { session } }) => {
          setUser(session?.user ?? null);
        });
        const { data: { subscription } } = supabaseClient.auth.onAuthStateChange((_event, session) => {
          setUser(session?.user ?? null);
        });
        return () => subscription.unsubscribe();
      }, []);

      useEffect(() => {
        if (user) {
          setTransactions([
            { id: 1, description: 'Salário Fixo', value: 8500, type: 'income', category: 'Salário', date: '2023-11-01', status: 'pago' },
            { id: 2, description: 'Jantar Restaurante', value: 250.40, type: 'expense', category: 'Lazer', date: '2023-11-05', status: 'pago' },
            { id: 3, description: 'Parcela iPhone', value: 450, type: 'expense', category: 'Cartão', date: '2023-11-10', status: 'pendente' },
            { id: 4, description: 'Venda de Consultoria', value: 1200, type: 'income', category: 'Extra', date: '2023-11-12', status: 'pago' },
            { id: 5, description: 'Energia Elétrica', value: 340, type: 'expense', category: 'Fixo', date: '2023-11-02', status: 'atrasado' },
          ]);
        }
      }, [user]);

      const formatCurrency = (val) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val);

      if (!user) return <AuthPage />;

      const toggleSidebar = () => setIsSidebarOpen(!isSidebarOpen);

      return (
        <div className="flex h-screen w-full relative">
          {isSidebarOpen && (
            <div className="fixed inset-0 z-40 drawer-overlay md:hidden" onClick={toggleSidebar}></div>
          )}

          <aside className={`
            fixed md:static inset-y-0 left-0 z-50 w-72 glass-effect sidebar-transition
            ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'}
            flex flex-col p-8 border-r border-white/10
          `}>
            <div className="flex items-center justify-between mb-12">
              <h1 className="text-2xl font-black tracking-tighter">
                Money<span className="gold-gradient-text">Forge</span>
              </h1>
              <button onClick={toggleSidebar} className="md:hidden text-2xl">
                <ion-icon name="close-outline"></ion-icon>
              </button>
            </div>

            <nav className="flex-1 space-y-3">
              <NavItem icon="apps-outline" label="Dashboard" active={activeTab === 'dashboard'} onClick={() => { setActiveTab('dashboard'); setIsSidebarOpen(false); }} />
              <NavItem icon="add-circle-outline" label="Nova Transação" active={activeTab === 'new'} onClick={() => { setActiveTab('new'); setIsSidebarOpen(false); }} />
              <NavItem icon="list-outline" label="Histórico" active={activeTab === 'history'} onClick={() => { setActiveTab('history'); setIsSidebarOpen(false); }} />
              <NavItem icon="flag-outline" label="Metas" active={activeTab === 'goals'} onClick={() => { setActiveTab('goals'); setIsSidebarOpen(false); }} />
            </nav>

            <div className="mt-auto pt-8 border-t border-white/5">
              <div className="flex items-center gap-4 mb-8">
                <div className="w-12 h-12 rounded-2xl gold-button flex items-center justify-center text-xl">
                  {user.user_metadata?.first_name?.[0] || 'U'}
                </div>
                <div className="overflow-hidden">
                  <p className="font-bold truncate text-sm">{user.user_metadata?.first_name || 'Usuário'}</p>
                  <p className="text-[10px] text-gray-500 truncate uppercase tracking-widest">Premium Member</p>
                </div>
              </div>
              <button onClick={() => supabaseClient.auth.signOut()} className="w-full py-4 glass-effect hover:bg-red-500/10 text-red-400 rounded-2xl text-xs font-bold flex items-center justify-center gap-2 transition-all">
                <ion-icon name="log-out-outline"></ion-icon> Terminar Sessão
              </button>
            </div>
          </aside>

          <main className="flex-1 overflow-y-auto w-full px-4 py-6 md:px-12 md:py-10">
            <header className="flex justify-between items-center mb-10">
              <div className="flex items-center gap-4">
                <button onClick={toggleSidebar} className="md:hidden glass-effect p-3 rounded-xl text-xl">
                  <ion-icon name="menu-outline"></ion-icon>
                </button>
                <div>
                  <h2 className="text-2xl md:text-3xl font-black capitalize">{activeTab === 'history' ? 'Histórico' : activeTab}</h2>
                  <p className="text-[10px] md:text-xs text-gray-500 uppercase tracking-[0.2em] font-bold">Gestão Inteligente</p>
                </div>
              </div>
            </header>

            <div className="max-w-7xl mx-auto">
              {activeTab === 'dashboard' && <Dashboard transactions={transactions} goals={goals} formatCurrency={formatCurrency} />}
              {activeTab === 'new' && <NewTransaction onAdd={(t) => setTransactions([t, ...transactions])} setActiveTab={setActiveTab} />}
              {activeTab === 'history' && <History transactions={transactions} formatCurrency={formatCurrency} setTransactions={setTransactions} />}
              {activeTab === 'goals' && <Goals goals={goals} setGoals={setGoals} formatCurrency={formatCurrency} />}
            </div>
          </main>
        </div>
      );
    };

    const NavItem = ({ icon, label, active, onClick }) => (
      <div onClick={onClick} className={`nav-item flex items-center gap-4 px-5 py-4 text-sm font-semibold ${active ? 'active shadow-lg shadow-yellow-500/5' : 'text-gray-400'}`}>
        <ion-icon name={icon} style={{fontSize: '22px'}}></ion-icon>
        <span>{label}</span>
      </div>
    );

    const Dashboard = ({ transactions, goals, formatCurrency }) => {
      const incomes = transactions.filter(t => t.type === 'income').reduce((a, b) => a + b.value, 0);
      const expenses = transactions.filter(t => t.type === 'expense').reduce((a, b) => a + b.value, 0);
      const expenseCats = transactions.filter(t => t.type === 'expense').reduce((acc, curr) => { acc[curr.category] = (acc[curr.category] || 0) + curr.value; return acc; }, {});
      const incomeCats = transactions.filter(t => t.type === 'income').reduce((acc, curr) => { acc[curr.category] = (acc[curr.category] || 0) + curr.value; return acc; }, {});

      return (
        <div className="space-y-8 fade-in">
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <StatCard label="Patrimônio Total" value={incomes - expenses} icon="wallet" color="text-white" />
            <StatCard label="Entradas Mensais" value={incomes} icon="trending-up" color="text-emerald-400" />
            <StatCard label="Saídas Mensais" value={expenses} icon="trending-down" color="text-red-400" />
          </div>
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <ChartCard title="Análise de Despesas" data={expenseCats} colors={['#ef4444', '#f59e0b', '#3b82f6', '#8b5cf6', '#10b981']} />
            <ChartCard title="Origem dos Ganhos" data={incomeCats} colors={['#10b981', '#3b82f6', '#fbbf24', '#f472b6', '#6366f1']} />
          </div>
        </div>
      );
    };

    const StatCard = ({ label, value, icon, color }) => (
      <div className="glass-effect p-8 rounded-[2.5rem] relative overflow-hidden group hover:-translate-y-1 transition-transform">
        <div className="absolute -right-4 -top-4 opacity-5 group-hover:opacity-10 transition-opacity">
           <ion-icon name={icon} style={{fontSize: '120px'}}></ion-icon>
        </div>
        <div className={`p-4 rounded-2xl bg-white/5 inline-flex ${color} mb-6`}>
          <ion-icon name={icon} style={{fontSize: '28px'}}></ion-icon>
        </div>
        <p className="text-[10px] text-gray-500 font-black uppercase tracking-[0.2em] mb-1">{label}</p>
        <h4 className={`text-2xl md:text-3xl font-black ${color}`}>{new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value)}</h4>
      </div>
    );

    const ChartCard = ({ title, data, colors }) => {
      const canvasRef = useRef(null);
      useEffect(() => {
        const ctx = canvasRef.current.getContext('2d');
        const chart = new Chart(ctx, {
          type: 'doughnut',
          data: {
            labels: Object.keys(data),
            datasets: [{ data: Object.values(data), backgroundColor: colors, borderWidth: 0, hoverOffset: 15 }]
          },
          options: {
            plugins: { legend: { position: 'right', labels: { color: '#888', font: { family: 'Plus Jakarta Sans', size: 10, weight: 'bold' }, padding: 15 } } },
            cutout: '75%',
            responsive: true,
            maintainAspectRatio: false
          }
        });
        return () => chart.destroy();
      }, [data]);
      return (
        <div className="glass-effect p-8 rounded-[2.5rem]">
          <h3 className="text-lg font-bold mb-6 italic">{title}</h3>
          <div className="h-64 relative"><canvas ref={canvasRef}></canvas></div>
        </div>
      );
    };

    const History = ({ transactions, formatCurrency, setTransactions }) => {
      const deleteItem = (id) => setTransactions(transactions.filter(t => t.id !== id));
      const incomes = transactions.filter(t => t.type === 'income').reduce((a, b) => a + b.value, 0);
      const expenses = transactions.filter(t => t.type === 'expense').reduce((a, b) => a + b.value, 0);

      return (
        <div className="space-y-8 fade-in">
          {/* Dashboard compact inside History */}
          <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div className="glass-effect p-6 rounded-3xl flex justify-between items-center">
               <div>
                 <p className="text-[10px] text-gray-500 font-bold uppercase">Património</p>
                 <p className="text-xl font-black">{formatCurrency(incomes - expenses)}</p>
               </div>
               <ion-icon name="wallet-outline" class="text-3xl text-gray-600"></ion-icon>
            </div>
            <div className="glass-effect p-6 rounded-3xl flex justify-between items-center border-l-4 border-emerald-500/30">
               <div>
                 <p className="text-[10px] text-gray-500 font-bold uppercase">Entradas</p>
                 <p className="text-xl font-black text-emerald-400">{formatCurrency(incomes)}</p>
               </div>
               <ion-icon name="arrow-up-circle-outline" class="text-3xl text-emerald-500"></ion-icon>
            </div>
            <div className="glass-effect p-6 rounded-3xl flex justify-between items-center border-l-4 border-red-500/30">
               <div>
                 <p className="text-[10px] text-gray-500 font-bold uppercase">Saídas</p>
                 <p className="text-xl font-black text-red-400">{formatCurrency(expenses)}</p>
               </div>
               <ion-icon name="arrow-down-circle-outline" class="text-3xl text-red-500"></ion-icon>
            </div>
          </div>

          <div className="glass-effect rounded-[3rem] overflow-hidden">
            <div className="overflow-x-auto">
              <table className="w-full text-left">
                <thead>
                  <tr className="border-b border-white/5 bg-white/2">
                    <th className="p-8 text-[10px] text-gray-500 font-black uppercase tracking-widest">Descrição</th>
                    <th className="p-8 text-[10px] text-gray-500 font-black uppercase tracking-widest">Categoria</th>
                    <th className="p-8 text-[10px] text-gray-500 font-black uppercase tracking-widest">Valor</th>
                    <th className="p-8 text-[10px] text-gray-500 font-black uppercase tracking-widest">Status</th>
                    <th className="p-8 text-[10px] text-gray-500 font-black uppercase tracking-widest">Ações</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-white/5">
                  {transactions.map(t => (
                    <tr key={t.id} className="hover:bg-white/2 transition-all group">
                      <td className="p-8">
                        <p className="text-sm font-bold">{t.description}</p>
                        <p className="text-[10px] text-gray-500">{t.date}</p>
                      </td>
                      <td className="p-8 text-xs font-semibold text-gray-400">{t.category}</td>
                      <td className={`p-8 text-sm font-black ${t.type === 'income' ? 'text-emerald-400' : 'text-white'}`}>
                        {t.type === 'income' ? '+' : '-'} {formatCurrency(t.value)}
                      </td>
                      <td className="p-8">
                        <span className={`px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest ${
                          t.status === 'pago' ? 'status-pago' : t.status === 'pendente' ? 'status-pendente' : 'status-atrasado'
                        }`}>
                          {t.status}
                        </span>
                      </td>
                      <td className="p-8">
                        <div className="flex gap-3">
                          <button className="p-3 bg-white/5 hover:bg-white/10 rounded-xl transition-all"><ion-icon name="create-outline"></ion-icon></button>
                          <button onClick={() => deleteItem(t.id)} className="p-3 bg-red-500/5 hover:bg-red-500/20 text-red-400 rounded-xl transition-all"><ion-icon name="trash-outline"></ion-icon></button>
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    };

    const Goals = ({ goals, setGoals, formatCurrency }) => {
      const [showModal, setShowModal] = useState(false);
      const [editingGoal, setEditingGoal] = useState(null);

      const saveGoal = (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const goalData = {
          id: editingGoal ? editingGoal.id : Date.now(),
          name: fd.get('name'),
          target: parseFloat(fd.get('target')),
          current: parseFloat(fd.get('current') || 0)
        };

        if (editingGoal) {
          setGoals(goals.map(g => g.id === editingGoal.id ? goalData : g));
        } else {
          setGoals([...goals, goalData]);
        }
        setShowModal(false);
        setEditingGoal(null);
      };

      const deleteGoal = (id) => setGoals(goals.filter(g => g.id !== id));

      return (
        <div className="space-y-8 fade-in">
          <div className="flex justify-between items-center">
             <h3 className="text-xl font-bold italic">Suas Metas Financeiras</h3>
             <button 
                onClick={() => { setEditingGoal(null); setShowModal(true); }}
                className="gold-button px-6 py-3 rounded-2xl text-xs font-black flex items-center gap-2"
              >
               <ion-icon name="add-outline"></ion-icon> Nova Meta
             </button>
          </div>

          <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-8">
            {goals.map(g => (
              <div key={g.id} className="glass-effect p-10 rounded-[3rem] border border-white/5 relative group">
                <div className="flex justify-between items-start mb-8">
                  <div className="p-4 rounded-2xl bg-yellow-500/10 text-yellow-500">
                    <ion-icon name="flag" style={{fontSize: '24px'}}></ion-icon>
                  </div>
                  <div className="flex gap-2">
                     <button onClick={() => { setEditingGoal(g); setShowModal(true); }} className="text-gray-500 hover:text-white transition-colors"><ion-icon name="create-outline"></ion-icon></button>
                     <button onClick={() => deleteGoal(g.id)} className="text-gray-500 hover:text-red-400 transition-colors"><ion-icon name="trash-outline"></ion-icon></button>
                  </div>
                </div>
                <h4 className="text-xl font-bold mb-1">{g.name}</h4>
                <p className="text-[10px] text-gray-500 font-black uppercase tracking-[0.2em] mb-8">Meta de Poupança</p>
                <div className="space-y-5">
                  <div className="flex justify-between items-end">
                    <span className="text-3xl font-black text-white">{Math.round((g.current/g.target)*100)}%</span>
                    <div className="text-right">
                      <p className="text-[10px] text-gray-500 font-bold uppercase">Restam</p>
                      <p className="text-xs font-bold text-yellow-500">{formatCurrency(Math.max(0, g.target - g.current))}</p>
                    </div>
                  </div>
                  <div className="w-full h-3 bg-white/5 rounded-full overflow-hidden">
                    <div className="h-full bg-gradient-to-r from-yellow-600 to-yellow-200" style={{width: `${Math.min(100, (g.current/g.target)*100)}%`}}></div>
                  </div>
                </div>
              </div>
            ))}
          </div>

          {/* Modal Meta */}
          {showModal && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/60 backdrop-blur-sm">
               <div className="glass-effect p-10 rounded-[2.5rem] w-full max-w-md shadow-2xl border border-white/10">
                  <h3 className="text-xl font-black mb-6">{editingGoal ? 'Editar Meta' : 'Criar Nova Meta'}</h3>
                  <form onSubmit={saveGoal} className="space-y-5">
                     <div className="space-y-1">
                        <label className="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Nome da Meta</label>
                        <input name="name" defaultValue={editingGoal?.name} placeholder="Ex: Viagem de Verão" className="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-sm outline-none" required />
                     </div>
                     <div className="grid grid-cols-2 gap-4">
                        <div className="space-y-1">
                          <label className="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Objetivo (R$)</label>
                          <input name="target" type="number" step="0.01" defaultValue={editingGoal?.target} placeholder="5000" className="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-sm outline-none" required />
                        </div>
                        <div className="space-y-1">
                          <label className="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Já Tenho (R$)</label>
                          <input name="current" type="number" step="0.01" defaultValue={editingGoal?.current} placeholder="0" className="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-sm outline-none" />
                        </div>
                     </div>
                     <div className="flex gap-4 pt-4">
                        <button type="button" onClick={() => setShowModal(false)} className="flex-1 py-4 glass-effect rounded-2xl text-xs font-bold uppercase tracking-widest">Cancelar</button>
                        <button type="submit" className="flex-1 py-4 gold-button rounded-2xl text-xs font-black uppercase tracking-widest">Salvar</button>
                     </div>
                  </form>
               </div>
            </div>
          )}
        </div>
      );
    };

    const NewTransaction = ({ onAdd, setActiveTab }) => {
      const [type, setType] = useState('expense');
      const handleSubmit = (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        onAdd({ id: Date.now(), description: fd.get('description'), value: parseFloat(fd.get('value')), type, category: fd.get('category'), date: fd.get('date'), status: 'pago' });
        setActiveTab('dashboard');
      };
      return (
        <div className="max-w-2xl mx-auto glass-effect p-10 rounded-[3rem] fade-in shadow-2xl">
          <h3 className="text-2xl font-black mb-8 italic">Nova Movimentação</h3>
          <form className="space-y-6" onSubmit={handleSubmit}>
            <div className="grid grid-cols-2 gap-4 p-1.5 glass-effect rounded-2xl">
              <button type="button" onClick={() => setType('income')} className={`py-4 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${type === 'income' ? 'gold-button' : 'text-gray-500'}`}>Ganhos</button>
              <button type="button" onClick={() => setType('expense')} className={`py-4 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${type === 'expense' ? 'gold-button' : 'text-gray-500'}`}>Gastos</button>
            </div>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
               <div className="space-y-2">
                  <label className="text-[10px] text-gray-500 font-bold uppercase ml-2 tracking-widest">Descrição</label>
                  <input name="description" className="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-sm outline-none" required />
               </div>
               <div className="space-y-2">
                  <label className="text-[10px] text-gray-500 font-bold uppercase ml-2 tracking-widest">Valor (R$)</label>
                  <input name="value" type="number" step="0.01" className="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-sm outline-none" required />
               </div>
            </div>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
               <div className="space-y-2">
                  <label className="text-[10px] text-gray-500 font-bold uppercase ml-2 tracking-widest">Categoria</label>
                  <select name="category" className="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-sm outline-none appearance-none">
                    <option value="Fixo">Fixo</option><option value="Salário">Salário</option><option value="Lazer">Lazer</option><option value="Extra">Extra</option>
                  </select>
               </div>
               <div className="space-y-2">
                  <label className="text-[10px] text-gray-500 font-bold uppercase ml-2 tracking-widest">Data</label>
                  <input name="date" type="date" defaultValue={new Date().toISOString().split('T')[0]} className="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-sm outline-none" />
               </div>
            </div>
            <button type="submit" className="gold-button w-full py-5 rounded-2xl text-sm font-black shadow-xl mt-6">Confirmar Lançamento</button>
          </form>
        </div>
      );
    };

    const AuthPage = () => (
      <div className="h-screen flex items-center justify-center p-6 bg-[url('./fundo.png')] bg-cover bg-center">
          <div className="glass-effect p-12 rounded-[3rem] w-full max-w-sm text-center shadow-2xl">
              <h1 className="text-4xl font-black mb-10 tracking-tighter">Money<span className="gold-gradient-text">Forge</span></h1>
              <p className="mb-10 text-sm text-gray-400 font-medium leading-relaxed">Bem-vindo à forja do seu destino financeiro.</p>
              <button onClick={() => window.location.reload()} className="gold-button px-10 py-5 rounded-2xl w-full shadow-2xl active:scale-95 transition-all uppercase tracking-widest text-xs font-black">Entrar no Sistema</button>
          </div>
      </div>
    );

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
