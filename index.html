<!DOCTYPE html>
<html lang="pt-pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoneyForge Pro | Financial Intelligence</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/sidebar/ionicons.esm.js"></script>
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap');
    
    :root {
      --gold: #bf953f;
      --gold-gradient: linear-gradient(135deg, #bf953f 0%, #fcf6ba 50%, #b38728 100%);
      --dark: #0a0a0a;
      --glass: rgba(15, 15, 15, 0.9);
      --border: rgba(255, 255, 255, 0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background: var(--dark);
      background-image: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #0a0a0a 100%);
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .glass-card {
      background: var(--glass);
      backdrop-filter: blur(25px);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .btn-gold {
      background: var(--gold-gradient);
      color: #000; 
      font-weight: 800; 
      font-size: 11px; 
      text-transform: uppercase;
      letter-spacing: 0.15em; 
      padding: 16px 32px; 
      border-radius: 50px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 15px rgba(191, 149, 63, 0.3);
      cursor: pointer;
    }
    .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(191, 149, 63, 0.5); }

    .input-field {
      width: 100%; 
      background: rgba(255, 255, 255, 0.03); 
      border: 1px solid var(--border);
      border-radius: 16px; 
      padding: 18px; 
      color: #fff; 
      font-size: 14px;
      transition: all 0.3s;
    }
    .input-field:focus { outline: none; border-color: var(--gold); }

    .nav-link {
      display: flex; align-items: center; gap: 16px; padding: 14px 20px;
      border-radius: 18px; color: #888; font-size: 13px; font-weight: 600;
      transition: all 0.3s; cursor: pointer;
    }
    .nav-link:hover, .nav-link.active { color: #fff; background: rgba(255, 255, 255, 0.03); }
    .nav-link.active { border: 1px solid rgba(191, 149, 63, 0.3); color: var(--gold); }

    .loader {
      border: 2px solid rgba(191, 149, 63, 0.1);
      border-top: 2px solid var(--gold);
      border-radius: 50%;
      width: 40px; height: 40px;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .category-tag {
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      background: rgba(255,255,255,0.05);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="babel">
    const { useState, useEffect, useMemo } = React;

    const SUPABASE_URL = 'https://onpdxpobidntgofqshlk.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9ucGR4cG9iaWRudGdvZnFzaGxrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDEyMzYyMjAsImV4cCI6MjA1NjgxMjIyMH0.fK0A9-Y-vN4o7Jp3D0H6m0Qo9H_6O_oH_oH_oH_oH_o';
    
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const CATEGORIES = {
      'Geral': 'grid-outline',
      'Alimentação': 'restaurant-outline',
      'Transporte': 'car-outline',
      'Moradia': 'home-outline',
      'Lazer': 'sparkles-outline',
      'Saúde': 'medkit-outline',
      'Educação': 'book-outline',
      'Salário': 'cash-outline',
      'Investimento': 'trending-up-outline'
    };

    const App = () => {
      const [session, setSession] = useState(null);
      const [loading, setLoading] = useState(true);
      const [activeTab, setActiveTab] = useState('dashboard');
      const [showModal, setShowModal] = useState(false);
      const [transactions, setTransactions] = useState([]);
      const [filter, setFilter] = useState('all');
      const [authForm, setAuthForm] = useState({ email: '', password: '', isLogin: true });

      useEffect(() => {
        supabaseClient.auth.getSession().then(({ data: { session } }) => {
          setSession(session);
          setLoading(false);
        });

        const { data: { subscription } } = supabaseClient.auth.onAuthStateChange((_event, session) => {
          setSession(session);
        });

        return () => subscription?.unsubscribe();
      }, []);

      useEffect(() => {
        if (session) fetchData();
      }, [session, filter]);

      const fetchData = async () => {
        let query = supabaseClient
          .from('transactions')
          .select('*')
          .order('date', { ascending: false });

        if (filter === 'income') query = query.eq('type', 'income');
        if (filter === 'expense') query = query.eq('type', 'expense');

        const { data, error } = await query;
        if (!error) setTransactions(data);
      };

      const handleToggleStatus = async (id, currentStatus) => {
        const newStatus = currentStatus === 'paid' ? 'pending' : 'paid';
        const { error } = await supabaseClient
          .from('transactions')
          .update({ status: newStatus })
          .eq('id', id);
        if (!error) fetchData();
      };

      const stats = useMemo(() => {
        const paidIncome = transactions.filter(t => t.type === 'income' && t.status === 'paid').reduce((a, b) => a + Number(b.value), 0);
        const paidExpense = transactions.filter(t => t.type === 'expense' && t.status === 'paid').reduce((a, b) => a + Number(b.value), 0);
        const pendingExpense = transactions.filter(t => t.type === 'expense' && t.status === 'pending').reduce((a, b) => a + Number(b.value), 0);
        
        return { 
          balance: paidIncome - paidExpense, 
          income: paidIncome, 
          expense: paidExpense,
          forecast: paidIncome - paidExpense - pendingExpense
        };
      }, [transactions]);

      if (loading) return <div className="h-screen flex items-center justify-center bg-black"><div className="loader"></div></div>;

      if (!session) {
        return (
          <div className="h-screen flex items-center justify-center p-6 bg-[url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&q=80')] bg-cover">
            <div className="absolute inset-0 bg-black/80"></div>
            <div className="glass-card p-12 w-full max-w-md text-center border-white/10 relative z-10">
              <h1 className="text-4xl font-black italic tracking-tighter mb-2">Money<span className="text-gold">Forge</span></h1>
              <p className="text-[10px] uppercase tracking-[0.4em] text-white/30 mb-10">Financial Intelligence</p>
              
              <form onSubmit={async (e) => {
                e.preventDefault();
                setLoading(true);
                const { error } = authForm.isLogin 
                  ? await supabaseClient.auth.signInWithPassword({ email: authForm.email, password: authForm.password })
                  : await supabaseClient.auth.signUp({ email: authForm.email, password: authForm.password });
                if (error) alert(error.message);
                setLoading(false);
              }} className="space-y-4">
                <input type="email" placeholder="E-mail" className="input-field" onChange={e => setAuthForm({...authForm, email: e.target.value})} required />
                <input type="password" placeholder="Senha" className="input-field" onChange={e => setAuthForm({...authForm, password: e.target.value})} required />
                <button type="submit" className="btn-gold w-full mt-4">{authForm.isLogin ? 'Entrar' : 'Cadastrar'}</button>
              </form>
              <button onClick={() => setAuthForm({...authForm, isLogin: !authForm.isLogin})} className="mt-8 text-[10px] uppercase font-black text-white/20 hover:text-white transition-all">
                {authForm.isLogin ? 'Não tem conta? Crie uma' : 'Já tem conta? Faça Login'}
              </button>
            </div>
          </div>
        );
      }

      return (
        <div className="flex h-screen p-6 gap-6 overflow-hidden">
          <aside className="w-72 glass-card flex flex-col p-8 shrink-0">
            <div className="mb-12">
              <h1 className="text-2xl font-black italic tracking-tighter">Money<span className="text-gold">Forge</span></h1>
              <p className="text-[8px] text-white/20 font-black uppercase tracking-widest mt-1">Intelligence System</p>
            </div>
            <nav className="flex-1 space-y-2">
              <NavLink label="Dashboard" icon="grid-outline" active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} />
              <NavLink label="Extrato" icon="receipt-outline" active={activeTab === 'history'} onClick={() => setActiveTab('history')} />
              <NavLink label="Cartões" icon="card-outline" active={activeTab === 'cards'} onClick={() => setActiveTab('cards')} />
            </nav>
            <button onClick={() => supabaseClient.auth.signOut()} className="mt-auto flex items-center gap-3 text-white/20 hover:text-red-500 text-[10px] font-black uppercase transition-all">
              <ion-icon name="log-out-outline"></ion-icon> Encerrar Sessão
            </button>
          </aside>

          <main className="flex-1 flex flex-col gap-6 overflow-hidden">
            <header className="glass-card p-8 flex justify-between items-center">
              <div>
                <h2 className="text-[10px] font-black uppercase tracking-[0.2em] text-white/30 italic">Visão Geral</h2>
                <p className="text-2xl font-black italic tracking-tight">{session.user.email.split('@')[0]}</p>
              </div>
              <div className="flex gap-4">
                <div className="text-right">
                  <p className="text-[9px] font-black uppercase text-white/20">Previsão Mensal</p>
                  <p className={`text-lg font-bold italic ${stats.forecast >= 0 ? 'text-gold' : 'text-red-400'}`}>
                    R$ {stats.forecast.toLocaleString('pt-BR')}
                  </p>
                </div>
              </div>
            </header>

            <section className="flex-1 overflow-y-auto space-y-6 pb-6">
              <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                <StatBox title="Saldo em Conta" value={stats.balance} />
                <StatBox title="Receitas (Pagas)" value={stats.income} color="text-emerald-500" />
                <StatBox title="Despesas (Pagas)" value={stats.expense} color="text-red-500" />
              </div>

              <div className="glass-card p-10">
                <div className="flex justify-between items-center mb-10">
                  <div>
                    <h3 className="text-xl font-black italic">Fluxo de <span className="text-gold">Caixa</span></h3>
                    <div className="flex gap-4 mt-4">
                      <FilterBtn active={filter === 'all'} label="Tudo" onClick={() => setFilter('all')} />
                      <FilterBtn active={filter === 'income'} label="Entradas" onClick={() => setFilter('income')} />
                      <FilterBtn active={filter === 'expense'} label="Saídas" onClick={() => setFilter('expense')} />
                    </div>
                  </div>
                  <button onClick={() => setShowModal(true)} className="btn-gold !py-3 !px-6 !text-[9px]">+ Lançamento</button>
                </div>

                <div className="space-y-4">
                  {transactions.map(t => (
                    <div key={t.id} className={`p-5 rounded-2xl flex justify-between items-center border transition-all ${t.status === 'pending' ? 'bg-red-500/5 border-red-500/20' : 'bg-white/[0.02] border-white/5'}`}>
                      <div className="flex items-center gap-4">
                        <div className={`w-12 h-12 rounded-xl flex items-center justify-center text-xl ${t.type === 'income' ? 'bg-emerald-500/10 text-emerald-500' : 'bg-red-500/10 text-red-500'}`}>
                          <ion-icon name={CATEGORIES[t.category] || 'help-outline'}></ion-icon>
                        </div>
                        <div>
                          <div className="flex items-center gap-2">
                            <p className="text-sm font-bold italic">{t.description}</p>
                            <span className="category-tag">{t.category}</span>
                          </div>
                          <p className="text-[9px] font-black uppercase text-white/20 tracking-widest">{t.date}</p>
                        </div>
                      </div>
                      <div className="flex items-center gap-6">
                        <div className="text-right">
                          <p className={`font-black italic ${t.type === 'income' ? 'text-emerald-500' : 'text-white'}`}>
                            {t.type === 'income' ? '+' : '-'} R$ {Number(t.value).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
                          </p>
                          <button 
                            onClick={() => handleToggleStatus(t.id, t.status)}
                            className={`text-[8px] font-black uppercase tracking-tighter mt-1 px-2 py-1 rounded-md transition-all ${t.status === 'paid' ? 'text-emerald-500 bg-emerald-500/10' : 'text-red-400 bg-red-400/10'}`}
                          >
                            {t.status === 'paid' ? 'Confirmado' : 'Pendente (Clique p/ Pagar)'}
                          </button>
                        </div>
                        <button onClick={async () => { if(confirm('Excluir?')) await supabaseClient.from('transactions').delete().eq('id', t.id); fetchData(); }} className="text-white/10 hover:text-red-500 transition-all">
                          <ion-icon name="trash-outline"></ion-icon>
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </section>
          </main>

          {showModal && (
            <div className="fixed inset-0 bg-black/95 backdrop-blur-xl z-[500] flex items-center justify-center p-6" onClick={() => setShowModal(false)}>
              <div className="glass-card p-10 w-full max-w-lg" onClick={e => e.stopPropagation()}>
                <h3 className="text-2xl font-black italic mb-8">Novo <span className="text-gold">Registo</span></h3>
                <form className="space-y-4" onSubmit={async (e) => {
                  e.preventDefault();
                  const form = e.target;
                  const { error } = await supabaseClient.from('transactions').insert([{
                    description: form.desc.value,
                    value: form.val.value,
                    type: form.type.value,
                    category: form.cat.value,
                    status: form.status.checked ? 'paid' : 'pending',
                    date: form.date.value,
                    userId: session.user.id
                  }]);
                  if (!error) { setShowModal(false); fetchData(); } else alert(error.message);
                }}>
                  <div className="grid grid-cols-2 gap-2 p-1 bg-black rounded-xl border border-white/5">
                    <label className="flex-1 cursor-pointer">
                      <input type="radio" name="type" value="income" className="hidden peer" defaultChecked />
                      <div className="py-2 text-center text-[9px] font-black uppercase peer-checked:bg-emerald-500/20 peer-checked:text-emerald-500 rounded-lg">Entrada</div>
                    </label>
                    <label className="flex-1 cursor-pointer">
                      <input type="radio" name="type" value="expense" className="hidden peer" />
                      <div className="py-2 text-center text-[9px] font-black uppercase peer-checked:bg-red-500/20 peer-checked:text-red-500 rounded-lg">Saída</div>
                    </label>
                  </div>
                  
                  <input name="desc" placeholder="O que é?" className="input-field" required />
                  <div className="grid grid-cols-2 gap-4">
                    <input name="val" type="number" step="0.01" placeholder="Valor" className="input-field" required />
                    <input name="date" type="date" className="input-field" defaultValue={new Date().toISOString().split('T')[0]} required />
                  </div>
                  
                  <select name="cat" className="input-field appearance-none">
                    {Object.keys(CATEGORIES).map(c => <option key={c} value={c} className="bg-neutral-900">{c}</option>)}
                  </select>

                  <label className="flex items-center gap-3 p-4 bg-white/[0.02] border border-white/5 rounded-xl cursor-pointer">
                    <input type="checkbox" name="status" defaultChecked className="w-4 h-4 accent-gold" />
                    <span className="text-[10px] font-black uppercase text-white/40">Já foi pago/recebido?</span>
                  </label>

                  <button type="submit" className="btn-gold w-full mt-4">Salvar Transação</button>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    };

    const NavLink = ({ label, icon, active, onClick }) => (
      <div onClick={onClick} className={`nav-link ${active ? 'active' : ''}`}>
        <ion-icon name={icon}></ion-icon>
        <span className="uppercase tracking-widest text-[10px] font-black">{label}</span>
      </div>
    );

    const StatBox = ({ title, value, color }) => (
      <div className="glass-card p-8 group hover:border-gold/30 transition-all">
        <p className="text-[9px] font-black uppercase tracking-[0.3em] text-white/20 mb-3 italic">{title}</p>
        <h4 className={`text-2xl font-black italic tracking-tight ${color || 'text-white'}`}>
          R$ {value.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
        </h4>
      </div>
    );

    const FilterBtn = ({ label, active, onClick }) => (
      <button onClick={onClick} className={`px-4 py-2 rounded-lg text-[9px] font-black uppercase tracking-widest transition-all ${active ? 'bg-gold text-black' : 'bg-white/5 text-white/30 hover:text-white'}`}>
        {label}
      </button>
    );

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
