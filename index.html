<!DOCTYPE html>
<html lang="pt-pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoneyForge Pro | Financial Intelligence</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/sidebar/ionicons.esm.js"></script>
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap');
    
    :root {
      --gold: #bf953f;
      --gold-gradient: linear-gradient(135deg, #bf953f 0%, #fcf6ba 50%, #b38728 100%);
      --dark: #0a0a0a;
      --glass: rgba(15, 15, 15, 0.85);
      --border: rgba(255, 255, 255, 0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background: var(--dark);
      background-image: url('fundo.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: #fff;
      min-height: 100vh;
    }

    .glass-card {
      background: var(--glass);
      backdrop-filter: blur(25px);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .btn-gold {
      background: var(--gold-gradient);
      color: #000; 
      font-weight: 800; 
      font-size: 11px; 
      text-transform: uppercase;
      letter-spacing: 0.15em; 
      padding: 16px 32px; 
      border-radius: 50px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 15px rgba(191, 149, 63, 0.3);
    }
    .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(191, 149, 63, 0.5); }

    .input-field {
      width: 100%; 
      background: rgba(255, 255, 255, 0.03); 
      border: 1px solid var(--border);
      border-radius: 16px; 
      padding: 18px; 
      color: #fff; 
      font-size: 14px;
      transition: all 0.3s;
    }
    .input-field:focus { outline: none; border-color: var(--gold); background: rgba(255, 255, 255, 0.05); }

    .nav-link {
      display: flex; align-items: center; gap: 16px; padding: 14px 20px;
      border-radius: 18px; color: #888; font-size: 13px; font-weight: 600;
      transition: all 0.3s; cursor: pointer;
    }
    .nav-link:hover { color: #fff; background: rgba(255, 255, 255, 0.03); }
    .nav-link.active { 
      background: rgba(191, 149, 63, 0.1); 
      color: #fff; 
      border: 1px solid rgba(191, 149, 63, 0.2);
    }

    .loader {
      border: 2px solid rgba(191, 149, 63, 0.1);
      border-top: 2px solid var(--gold);
      border-radius: 50%;
      width: 30px; height: 30px;
      animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="babel">
    const { useState, useEffect, useMemo } = React;

    // --- CONFIGURAÇÃO SUPABASE ---
    const SUPABASE_URL = 'https://SUA_URL.supabase.co';
    const SUPABASE_ANON_KEY = 'SUA_KEY';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const App = () => {
      const [session, setSession] = useState(null);
      const [loading, setLoading] = useState(true);
      const [activeTab, setActiveTab] = useState('dashboard');
      const [showModal, setShowModal] = useState(null);
      const [transactions, setTransactions] = useState([]);
      const [authForm, setAuthForm] = useState({ email: '', password: '', isLogin: true });

      useEffect(() => {
        supabaseClient.auth.getSession().then(({ data: { session } }) => {
          setSession(session);
          setLoading(false);
        });
        const { data: { subscription } } = supabaseClient.auth.onAuthStateChange((_event, session) => {
          setSession(session);
        });
        return () => subscription.unsubscribe();
      }, []);

      useEffect(() => {
        if (!session) return;
        fetchData();
        const channel = supabaseClient
          .channel('db-changes')
          .on('postgres_changes', { event: '*', schema: 'public', table: 'transactions' }, () => fetchData())
          .subscribe();
        return () => supabaseClient.removeChannel(channel);
      }, [session]);

      const fetchData = async () => {
        const { data, error } = await supabaseClient
          .from('transactions')
          .select('*')
          .order('date', { ascending: false });
        if (!error) setTransactions(data);
      };

      const handleAuth = async (e) => {
        e.preventDefault();
        setLoading(true);
        const { error } = authForm.isLogin 
          ? await supabaseClient.auth.signInWithPassword({ email: authForm.email, password: authForm.password })
          : await supabaseClient.auth.signUp({ email: authForm.email, password: authForm.password });
        if (error) alert(error.message);
        setLoading(false);
      };

      const stats = useMemo(() => {
        const income = transactions.filter(t => t.type === 'income').reduce((a, b) => a + Number(b.value), 0);
        const expense = transactions.filter(t => t.type === 'expense').reduce((a, b) => a + Number(b.value), 0);
        return { total: income - expense, income, expense };
      }, [transactions]);

      if (loading) return <div className="h-screen flex items-center justify-center bg-black"><div className="loader"></div></div>;

      if (!session) {
        return (
          <div className="h-screen flex items-center justify-center p-6">
            <div className="glass-card p-10 w-full max-w-md text-center">
              <div className="mb-10">
                <h1 className="text-4xl font-black italic tracking-tighter">Money<span className="text-gold">Forge</span></h1>
                <p className="text-[10px] uppercase tracking-[0.4em] text-white/20 mt-2">Financial Intelligence</p>
              </div>
              <form onSubmit={handleAuth} className="space-y-4">
                <div className="text-left">
                  <label className="text-[9px] font-black uppercase text-white/30 ml-2 mb-1 block">E-mail Corporativo</label>
                  <input type="email" className="input-field" placeholder="seu@email.com" value={authForm.email} onChange={e => setAuthForm({...authForm, email: e.target.value})} required />
                </div>
                <div className="text-left">
                  <label className="text-[9px] font-black uppercase text-white/30 ml-2 mb-1 block">Senha de Acesso</label>
                  <input type="password" className="input-field" placeholder="••••••••" value={authForm.password} onChange={e => setAuthForm({...authForm, password: e.target.value})} required />
                </div>
                <button type="submit" className="btn-gold w-full mt-6">Entrar no Sistema</button>
              </form>
              <button onClick={() => setAuthForm({...authForm, isLogin: !authForm.isLogin})} className="mt-8 text-[10px] font-black uppercase text-white/20 hover:text-white transition-all">
                {authForm.isLogin ? 'Solicitar Convite de Cadastro' : 'Já possui acesso? Faça Login'}
              </button>
            </div>
          </div>
        );
      }

      return (
        <div className="flex h-screen p-6 gap-6">
          {/* Sidebar */}
          <aside className="w-72 glass-card flex flex-col p-8 shrink-0">
            <div className="mb-12">
              <h1 className="text-2xl font-black italic tracking-tighter">Money<span className="text-gold">Forge</span></h1>
              <p className="text-[8px] text-white/20 font-black uppercase tracking-widest mt-1">Intelligence System</p>
            </div>

            <nav className="flex-1 space-y-2">
              <NavLink label="Estatísticas" icon="bar-chart-outline" active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} />
              <NavLink label="Histórico" icon="list-outline" active={activeTab === 'history'} onClick={() => setActiveTab('history')} />
              <NavLink label="Planejamento" icon="map-outline" active={activeTab === 'planning'} onClick={() => setActiveTab('planning')} />
              <NavLink label="Metas" icon="flag-outline" active={activeTab === 'goals'} onClick={() => setActiveTab('goals')} />
              <NavLink label="Dívidas" icon="card-outline" active={activeTab === 'debts'} onClick={() => setActiveTab('debts')} />
            </nav>

            <button onClick={() => supabaseClient.auth.signOut()} className="mt-auto flex items-center gap-3 text-white/20 hover:text-red-500 text-[10px] font-black uppercase tracking-widest transition-all">
              <ion-icon name="log-out-outline"></ion-icon> Sair do Sistema
            </button>
          </aside>

          {/* Main Content */}
          <main className="flex-1 flex flex-col gap-6 overflow-hidden">
            {/* Header Corrigido - Sem o botão de Nova Transação */}
            <header className="glass-card p-8 flex justify-between items-center">
              <div>
                <h2 className="text-[10px] font-black uppercase tracking-[0.2em] text-white/30 italic">Bem-vindo de volta,</h2>
                <p className="text-2xl font-black italic tracking-tight">{session.user.email.split('@')[0]}</p>
              </div>
              <div className="flex items-center gap-4">
                 <div className="text-right mr-4">
                    <p className="text-[9px] font-black uppercase text-white/20">Status da Conta</p>
                    <p className="text-[11px] font-bold text-gold italic">Acesso Elite</p>
                 </div>
                 <div className="w-12 h-12 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center text-xl font-black italic">
                   {session.user.email[0].toUpperCase()}
                 </div>
              </div>
            </header>

            <section className="flex-1 overflow-y-auto space-y-6">
               <div className="grid grid-cols-3 gap-6">
                  <StatBox title="Saldo Atual" value={stats.total} />
                  <StatBox title="Receitas" value={stats.income} color="text-emerald-500" />
                  <StatBox title="Despesas" value={stats.expense} color="text-red-500" />
               </div>

               <div className="glass-card p-10">
                  <div className="flex justify-between items-center mb-10">
                    <h3 className="text-xl font-black italic">Ajustes do <span className="text-gold">Sistema</span></h3>
                    <button onClick={() => setShowModal(true)} className="btn-gold !py-3 !px-6 !text-[9px]">
                      + Nova Transação
                    </button>
                  </div>
                  
                  {/* Lista de Exemplo */}
                  <div className="space-y-4">
                    {transactions.length === 0 ? (
                      <p className="text-center py-20 text-white/10 font-black uppercase tracking-widest text-xs italic">Nenhum registo encontrado</p>
                    ) : (
                      transactions.map(t => (
                        <div key={t.id} className="p-5 bg-white/[0.02] border border-white/5 rounded-2xl flex justify-between items-center group hover:bg-white/[0.04] transition-all">
                          <div className="flex items-center gap-4">
                            <div className={`w-10 h-10 rounded-xl flex items-center justify-center ${t.type === 'income' ? 'bg-emerald-500/10 text-emerald-500' : 'bg-red-500/10 text-red-500'}`}>
                              <ion-icon name={t.type === 'income' ? 'add-circle-outline' : 'remove-circle-outline'}></ion-icon>
                            </div>
                            <div>
                              <p className="text-sm font-bold italic">{t.description}</p>
                              <p className="text-[9px] font-black uppercase text-white/20 tracking-widest">{t.date}</p>
                            </div>
                          </div>
                          <p className={`font-black italic ${t.type === 'income' ? 'text-emerald-500' : 'text-white'}`}>
                            {t.type === 'income' ? '+' : '-'} R$ {Number(t.value).toLocaleString()}
                          </p>
                        </div>
                      ))
                    )}
                  </div>
               </div>
            </section>
          </main>

          {/* Modal de Nova Transação */}
          {showModal && (
            <div className="fixed inset-0 bg-black/95 backdrop-blur-xl z-[500] flex items-center justify-center p-6" onClick={() => setShowModal(false)}>
              <div className="glass-card p-12 w-full max-w-lg" onClick={e => e.stopPropagation()}>
                <h3 className="text-2xl font-black italic mb-8">Novo <span className="text-gold">Registo</span></h3>
                <form className="space-y-6" onSubmit={async (e) => {
                  e.preventDefault();
                  const form = e.target;
                  const { error } = await supabaseClient.from('transactions').insert([{
                    description: form.desc.value,
                    value: form.val.value,
                    type: form.type.value,
                    date: new Date().toISOString().split('T')[0],
                    userId: session.user.id
                  }]);
                  if (!error) { setShowModal(false); fetchData(); }
                }}>
                  <div className="grid grid-cols-2 gap-2 p-1 bg-black rounded-2xl border border-white/5 mb-6">
                    <label className="flex-1">
                      <input type="radio" name="type" value="income" className="hidden peer" defaultChecked />
                      <div className="py-3 text-center text-[10px] font-black uppercase rounded-xl cursor-pointer peer-checked:bg-emerald-500/20 peer-checked:text-emerald-500 text-white/20 transition-all">Entrada</div>
                    </label>
                    <label className="flex-1">
                      <input type="radio" name="type" value="expense" className="hidden peer" />
                      <div className="py-3 text-center text-[10px] font-black uppercase rounded-xl cursor-pointer peer-checked:bg-red-500/20 peer-checked:text-red-500 text-white/20 transition-all">Saída</div>
                    </label>
                  </div>
                  <input name="desc" placeholder="Descrição da Transação" className="input-field" required />
                  <input name="val" type="number" step="0.01" placeholder="Valor R$ 0,00" className="input-field" required />
                  <button type="submit" className="btn-gold w-full">Finalizar Registo</button>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    };

    const NavLink = ({ label, icon, active, onClick }) => (
      <div onClick={onClick} className={`nav-link ${active ? 'active' : ''}`}>
        <ion-icon name={icon} style={{fontSize: '20px'}}></ion-icon>
        <span className="uppercase tracking-widest text-[10px] font-black">{label}</span>
      </div>
    );

    const StatBox = ({ title, value, color }) => (
      <div className="glass-card p-8">
        <p className="text-[9px] font-black uppercase tracking-[0.3em] text-white/20 mb-3 italic">{title}</p>
        <h4 className={`text-2xl font-black italic tracking-tight ${color || 'text-white'}`}>
          R$ {value.toLocaleString('pt-PT', { minimumFractionDigits: 2 })}
        </h4>
      </div>
    );

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
