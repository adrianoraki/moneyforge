<!DOCTYPE html>
<html lang="pt-pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoneyForge Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
    
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background: #050505; color: white; margin: 0; overflow: hidden;
    }

    .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
    
    .gold-gradient {
      background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .btn-gold {
      background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728);
      color: #000; font-weight: 800; transition: 0.3s;
    }
    .btn-gold:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(191, 149, 63, 0.3); }

    .nav-link { color: #64748b; transition: 0.2s; cursor: pointer; border-radius: 12px; }
    .nav-link.active { background: rgba(191, 149, 63, 0.1); color: #facc15; }

    .scroll-custom::-webkit-scrollbar { width: 4px; }
    .scroll-custom::-webkit-scrollbar-thumb { background: rgba(191, 149, 63, 0.2); border-radius: 10px; }

    .fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const SUPABASE_URL = "https://bicljinwvfmmjllnshcd.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJpY2xqaW53dmZtbWpsbG5zaGNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4Mzc3MDcsImV4cCI6MjA4OTQxMzcwN30.4YbAXUNq79BueSwct3RYKRI0eNJ0pWxMzM_VGTlhz6Q";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const App = () => {
      const [user, setUser] = useState(null);
      const [activeTab, setActiveTab] = useState('dashboard');
      const [sidebar, setSidebar] = useState(false);

      useEffect(() => {
        supabaseClient.auth.getSession().then(({ data }) => setUser(data.session?.user ?? null));
      }, []);

      if (!user) return <AuthPage onLogin={setUser} />;

      return (
        <div className="flex h-screen w-full">
          {/* Sidebar */}
          <aside className={`fixed lg:static inset-y-0 left-0 z-50 w-64 glass p-6 transition-all ${sidebar ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'}`}>
            <h1 className="text-xl font-extrabold italic mb-10">Money<span className="gold-gradient">Forge</span></h1>
            
            <nav className="space-y-1">
              <MenuSection title="Principal" />
              <MenuItem icon="grid-outline" label="Dashboard" active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} />
              <MenuItem icon="pie-chart-outline" label="Gráficos" active={activeTab === 'charts'} onClick={() => setActiveTab('charts')} />
              
              <MenuSection title="Gestão" />
              <MenuItem icon="sync-outline" label="Assinaturas" active={activeTab === 'subs'} onClick={() => setActiveTab('subs')} />
              <MenuItem icon="trending-down-outline" label="Dívidas" active={activeTab === 'debts'} onClick={() => setActiveTab('debts')} />
              <MenuItem icon="rocket-outline" label="Planeamento" active={activeTab === 'plan'} onClick={() => setActiveTab('plan')} />
              
              <MenuSection title="Sistema" />
              <MenuItem icon="settings-outline" label="Definições" active={activeTab === 'settings'} onClick={() => setActiveTab('settings')} />
            </nav>

            <button onClick={() => supabaseClient.auth.signOut()} className="absolute bottom-6 left-6 text-red-400 text-[10px] font-bold uppercase tracking-widest flex items-center gap-2">
              <ion-icon name="log-out-outline"></ion-icon> Terminar Sessão
            </button>
          </aside>

          {/* Main */}
          <main className="flex-1 flex flex-col overflow-hidden bg-[#080808]">
            <header className="p-6 lg:px-12 flex justify-between items-center">
              <button onClick={() => setSidebar(true)} className="lg:hidden text-2xl"><ion-icon name="menu-outline"></ion-icon></button>
              <h2 className="text-lg font-bold italic capitalize">{activeTab}</h2>
              <div className="flex items-center gap-3">
                <div className="text-right hidden sm:block">
                  <p className="text-[10px] text-gray-500 font-bold uppercase">{user.email.split('@')[0]}</p>
                  <p className="text-[9px] text-emerald-500 font-bold">Premium Active</p>
                </div>
                <div className="w-10 h-10 rounded-full btn-gold flex items-center justify-center text-sm uppercase">{user.email[0]}</div>
              </div>
            </header>

            <section className="flex-1 overflow-y-auto p-6 lg:px-12 scroll-custom">
              <div className="max-w-5xl mx-auto space-y-6 fade-in">
                {activeTab === 'dashboard' && <Dashboard />}
                {activeTab === 'charts' && <ChartsView />}
                {activeTab === 'subs' && <SubscriptionsView />}
                {activeTab === 'debts' && <DebtsView />}
                {activeTab === 'plan' && <PlanningView />}
                {activeTab === 'settings' && <SettingsView user={user} />}
              </div>
            </section>
          </main>
        </div>
      );
    };

    const MenuSection = ({ title }) => <p className="text-[9px] text-gray-600 font-bold uppercase tracking-[0.2em] mt-6 mb-2 ml-4">{title}</p>;
    
    const MenuItem = ({ icon, label, active, onClick }) => (
      <div onClick={onClick} className={`nav-link flex items-center gap-3 px-4 py-3 text-xs font-semibold ${active ? 'active' : ''}`}>
        <ion-icon name={icon} style={{fontSize: '18px'}}></ion-icon>
        {label}
      </div>
    );

    // --- Componentes das Abas ---

    const Dashboard = () => (
      <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
        <StatCard title="Saldo Atual" value="€ 4.250,00" color="border-yellow-500" />
        <StatCard title="Gastos do Mês" value="€ 1.120,50" color="border-red-500" />
        <StatCard title="Previsão de Poupança" value="€ 850,00" color="border-emerald-500" />
        
        <div className="md:col-span-2 glass p-8 rounded-[2rem]">
          <h3 className="font-bold mb-6 italic">Fluxo de Caixa Semanal</h3>
          <div className="h-40 flex items-end justify-between gap-2">
            {[30, 60, 45, 90, 55, 75, 40].map((h, i) => (
              <div key={i} className="flex-1 bg-white/5 rounded-lg relative group">
                <div className="absolute bottom-0 w-full btn-gold rounded-lg transition-all" style={{height: `${h}%`}}></div>
              </div>
            ))}
          </div>
        </div>

        <div className="glass p-8 rounded-[2rem]">
          <h3 className="font-bold mb-4 italic">Alerta de Gastos</h3>
          <div className="space-y-4">
            <CategoryMini label="Lazer" p={85} />
            <CategoryMini label="Alimentação" p={40} />
            <CategoryMini label="Transporte" p={15} />
          </div>
        </div>
      </div>
    );

    const StatCard = ({ title, value, color }) => (
      <div className={`glass p-6 rounded-3xl border-l-4 ${color}`}>
        <p className="text-[9px] text-gray-500 font-bold uppercase tracking-wider mb-1">{title}</p>
        <p className="text-2xl font-black">{value}</p>
      </div>
    );

    const CategoryMini = ({ label, p }) => (
      <div className="space-y-1">
        <div className="flex justify-between text-[9px] font-bold uppercase"><span>{label}</span><span>{p}%</span></div>
        <div className="h-1 bg-white/5 rounded-full overflow-hidden">
          <div className="h-full btn-gold" style={{width: `${p}%`}}></div>
        </div>
      </div>
    );

    const SubscriptionsView = () => (
      <div className="space-y-6">
        <div className="flex justify-between items-center"><h3 className="font-bold italic">Pagamentos Recorrentes</h3><button className="btn-gold px-4 py-2 rounded-xl text-[9px] uppercase">+ Novo</button></div>
        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
          <SubItem name="Netflix" price="€ 15,99" next="Dia 12" />
          <SubItem name="Spotify" price="€ 10,99" next="Dia 20" />
          <SubItem name="Academia" price="€ 35,00" next="Dia 01" />
        </div>
      </div>
    );

    const SubItem = ({ name, price, next }) => (
      <div className="glass p-5 rounded-2xl flex justify-between items-center border border-white/5">
        <div><p className="font-bold text-sm">{name}</p><p className="text-[10px] text-gray-500">{next}</p></div>
        <p className="text-yellow-500 font-bold">{price}</p>
      </div>
    );

    const DebtsView = () => (
      <div className="glass p-8 rounded-[2rem] space-y-6">
        <h3 className="font-bold italic">Controle de Quitação</h3>
        <div className="p-6 bg-white/3 rounded-2xl border border-white/5">
          <div className="flex justify-between mb-2"><span className="text-xs font-bold uppercase">Crédito Habitação</span><span className="text-yellow-500 text-xs font-bold">42% Pago</span></div>
          <div className="h-3 bg-white/5 rounded-full overflow-hidden"><div className="h-full btn-gold w-[42%]"></div></div>
          <div className="flex justify-between mt-4 text-[10px] text-gray-500 font-bold uppercase"><span>Pago: € 84.000</span><span>Total: € 200.000</span></div>
        </div>
      </div>
    );

    const PlanningView = () => (
      <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div className="glass p-8 rounded-[2rem]">
          <h3 className="font-bold mb-4 italic">Previsão 6 Meses</h3>
          <p className="text-3xl font-black text-emerald-500">+ € 5.100,00</p>
          <p className="text-xs text-gray-500 mt-2">Baseado no seu histórico de poupança atual.</p>
        </div>
      </div>
    );

    const SettingsView = ({ user }) => (
      <div className="max-w-xl glass p-8 rounded-[2rem] space-y-6">
        <h3 className="font-bold italic">Definições da Conta</h3>
        <div className="space-y-4">
          <div className="p-4 bg-white/5 rounded-xl border border-white/5 flex justify-between items-center">
             <span className="text-xs font-bold uppercase text-gray-500">E-mail</span>
             <span className="text-xs font-bold">{user.email}</span>
          </div>
          <button className="w-full btn-gold py-4 rounded-xl text-[10px] uppercase">Alterar Senha</button>
          <button className="w-full py-4 rounded-xl text-[10px] uppercase border border-white/10 hover:bg-white/5">Limpar Todos os Dados</button>
        </div>
      </div>
    );

    const ChartsView = () => (
      <div className="glass p-10 rounded-[2.5rem] flex flex-col items-center justify-center min-h-[300px] text-center">
        <ion-icon name="stats-chart-outline" style={{fontSize: '48px', color: '#bf953f'}}></ion-icon>
        <h3 className="mt-4 font-bold italic">Gráficos Detalhados</h3>
        <p className="text-xs text-gray-500 max-w-xs mt-2 uppercase tracking-widest font-bold">Módulo em processamento de dados históricos...</p>
      </div>
    );

    const AuthPage = ({ onLogin }) => {
      const [email, setEmail] = useState('');
      const [pass, setPass] = useState('');
      const handle = async (e) => {
        e.preventDefault();
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password: pass });
        if (error) await supabaseClient.auth.signUp({ email, password: pass });
        else onLogin(data.user);
      };
      return (
        <div className="h-screen flex items-center justify-center p-6 bg-[#050505]">
          <div className="glass p-10 rounded-[3rem] w-full max-w-sm text-center">
            <h1 className="text-3xl font-black italic mb-2">Money<span className="gold-gradient">Forge</span></h1>
            <p className="text-[9px] text-gray-500 font-bold uppercase tracking-[0.3em] mb-8">Gestão Financeira de Elite</p>
            <form onSubmit={handle} className="space-y-3">
              <input type="email" placeholder="E-mail" className="w-full p-4 rounded-xl bg-white/5 border border-white/10 outline-none text-sm" onChange={e => setEmail(e.target.value)} />
              <input type="password" placeholder="Senha" className="w-full p-4 rounded-xl bg-white/5 border border-white/10 outline-none text-sm" onChange={e => setPass(e.target.value)} />
              <button className="w-full btn-gold py-4 rounded-xl text-[10px] uppercase tracking-widest mt-4">Entrar na Forja</button>
            </form>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
